<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission débutant - Jeu de rôle : 스피드 쇼핑</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Tone.js for Sounds -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #FEFCE8;
            touch-action: none;
            font-family: 'Inter', 'Noto Sans', sans-serif;
            color: #1F2937;
        }

        #app-container {
            width: 100vw; height: 100dvh;
            padding: clamp(10px, 3vh, 2rem);
            box-sizing: border-box;
            display: flex; justify-content: center; align-items: center;
        }

        .lesson-card {
            width: 100%; max-width: 800px; height: 100%;
            background: white; border-radius: 1.5rem; border: 2px solid #FEF08A;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        #content-area {
            flex: 1 1 auto; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: clamp(1.5rem, 4vw, 3rem); gap: clamp(1.5rem, 4vh, 2.5rem);
            overflow: hidden; min-height: 0; position: relative;
        }

        .text-title { font-size: clamp(1.5rem, 5vw, 2.5rem); line-height: 1.2; font-weight: 800; }
        .text-body { font-size: clamp(1rem, 3vw, 1.25rem); line-height: 1.5; color: #374151; }
        .text-icon { font-size: clamp(3.5rem, 10vw, 5rem); }

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .animate-pop-in { animation: popIn 0.3s ease-out forwards; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }

        .recording-pulse { animation: pulse-red 1.5s infinite; background-color: #EF4444 !important; color: white !important; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .audio-wave { display: flex; align-items: center; justify-content: center; gap: 4px; height: 100%; }
        .audio-wave span { display: block; width: 4px; background-color: #22C55E; border-radius: 2px; animation: wave 1s infinite ease-in-out; }
        .audio-wave span:nth-child(2) { animation-delay: 0.2s; }
        .audio-wave span:nth-child(3) { animation-delay: 0.4s; }
        .audio-wave span:nth-child(4) { animation-delay: 0.6s; }
        @keyframes wave { 0%, 100% { height: 30%; } 50% { height: 100%; } }

        #popup-overlay { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(2px); }

        .control-btn {
            padding: clamp(0.5rem, 2vw, 0.75rem) clamp(1rem, 3vw, 1.5rem);
            border-radius: 0.75rem; font-weight: 700; font-size: clamp(0.875rem, 2vw, 1rem);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; white-space: nowrap;
        }

        .item-btn {
            font-size: clamp(2rem, 7vw, 3.5rem);
            border-radius: 1rem;
            border: 3px solid transparent;
            transition: all 0.2s;
            padding: clamp(0.5rem, 2vw, 1rem);
            cursor: pointer;
            background: #F9FAFB;
            min-width: 0;
        }
        .item-btn.selected {
            border-color: #22C55E;
            background: #F0FDF4;
            box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
        }

        .payment-btn {
            font-size: clamp(2rem, 7vw, 3.5rem);
            border-radius: 1rem;
            border: 3px solid transparent;
            transition: all 0.2s;
            padding: clamp(0.5rem, 2.5vw, 1.2rem) clamp(1.5rem, 4vw, 3rem);
            cursor: pointer;
            background: #F9FAFB;
        }
        .payment-btn.selected {
            border-color: #3B82F6;
            background: #EFF6FF;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        .mission-box {
            background: #FEF9C3;
            border: 2px solid #FDE047;
            border-radius: 1rem;
            padding: clamp(0.75rem, 2vw, 1.25rem) clamp(1rem, 3vw, 1.75rem);
            width: 100%;
            max-width: 480px;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="lesson-view" class="lesson-card">
        <div id="content-area"></div>

        <div id="controls-area" class="w-full flex-none border-t border-gray-100 bg-white px-6 py-6 flex flex-col justify-center gap-3 z-10 relative">
            <div id="progress-container" class="hidden w-full flex-col gap-1">
                <div class="flex justify-end w-full leading-none">
                    <span id="progress-text" class="text-[10px] text-gray-400 font-bold tracking-wider m-0 leading-none">1/6</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-1">
                    <div id="progress-bar" class="bg-green-500 h-1 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <div class="flex justify-between items-center w-full">
                <div class="flex items-center gap-2">
                    <button id="btn-prev" class="invisible control-btn bg-gray-100 text-gray-600 hover:bg-gray-200">
                        <i class="ph ph-arrow-left mr-1"></i> <span class="hidden sm:inline">Précédent</span>
                    </button>
                    <button id="btn-popup-toggle" class="invisible control-btn bg-yellow-100 text-yellow-700 hover:bg-yellow-200">
                        <i class="ph ph-chat-centered-text mr-1"></i> <span class="hidden sm:inline">Exercice</span>
                    </button>
                </div>
                <button id="btn-next" class="control-btn bg-green-500 text-white hover:bg-green-600 disabled:opacity-50 shadow-sm disabled:cursor-not-allowed">
                    <span id="btn-next-text">Commencer</span> <i id="btn-next-icon" class="ph ph-arrow-right ml-1"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="popup-overlay" class="absolute inset-0 z-50 hidden flex justify-center items-center p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-[420px] flex flex-col animate-pop-in relative border-4 border-yellow-400 p-6 md:p-8">
            <button id="btn-close-popup" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 p-1 leading-none z-10">
                <i class="ph ph-x text-2xl"></i>
            </button>
            <div id="popup-content" class="w-full flex flex-col items-center justify-center gap-5"></div>
        </div>
    </div>
</div>

<script>
    const TOTAL_PAGES = 7;
    let currentIndex = 0;
    let currentAudio = null;
    let popupAudio = null;
    let correctSound, completionSynth, transitionSynth, successSynth, errorSynth, bellSynth;
    let mediaRecorder, audioChunks = [], isRecording = false;
    let selectedItems = [];
    let selectedPayment = null;

    let pageStates = Array.from({ length: TOTAL_PAGES }, () => ({
        isPassed: false,
        isSkipped: false,
        audioPlayed: false,
        attemptsCount: 0,
        lastStatusHtml: '',
        lastStatusClass: ''
    }));

    const BASE_44_ORIGIN = "https://coreeno.base44.app";
    const CLOVA_API_FUNCTION_URL = BASE_44_ORIGIN + '/api/functions/naverClovaSpeech';

    function calculateSimilarity(str1, str2) {
        const s1 = (str1 || "").replace(/[^가-힣a-zA-Z0-9]/g, '');
        const s2 = (str2 || "").replace(/[^가-힣a-zA-Z0-9]/g, '');
        if (s1.length === 0 && s2.length === 0) return 100;
        if (s1.length === 0 || s2.length === 0) return 0;
        let costs = new Array(s2.length + 1);
        for (let i = 0; i <= s1.length; i++) {
            let lastValue = i;
            for (let j = 0; j <= s2.length; j++) {
                if (i === 0) costs[j] = j;
                else if (j > 0) {
                    let newValue = costs[j - 1];
                    if (s1.charAt(i - 1) !== s2.charAt(j - 1))
                        newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                    costs[j - 1] = lastValue;
                    lastValue = newValue;
                }
            }
            if (i > 0) costs[s2.length] = lastValue;
        }
        return Math.max(0, (1 - costs[s2.length] / Math.max(s1.length, s2.length)) * 100);
    }

    async function initSynths() {
        if (!correctSound) {
            await Tone.start();
            correctSound = new Tone.Synth().toDestination();
            completionSynth = new Tone.PolySynth(Tone.Synth).toDestination();
            successSynth = new Tone.PolySynth(Tone.Synth).toDestination();
            transitionSynth = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 } }).toDestination();
            errorSynth = new Tone.Synth({ oscillator: { type: 'triangle' }, envelope: { attack: 0.05, decay: 0.2, sustain: 0.2, release: 0.4 } }).toDestination();
            bellSynth = new Tone.PolySynth(Tone.Synth).toDestination();
            bellSynth.set({ oscillator: { type: 'sine' }, envelope: { attack: 0.001, decay: 0.8, sustain: 0, release: 1.0 } });
        }
    }

    function stopAllMedia() {
        if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
        if (popupAudio) { popupAudio.pause(); popupAudio.currentTime = 0; }
        if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); isRecording = false; }
    }

    function updateProgress() {
        const container = document.getElementById('progress-container');
        const bar = document.getElementById('progress-bar');
        const text = document.getElementById('progress-text');
        if (currentIndex === 0) { container.classList.add('hidden'); return; }
        container.classList.remove('hidden'); container.classList.add('flex');
        const total = TOTAL_PAGES - 1;
        bar.style.width = `${(currentIndex / total) * 100}%`;
        text.innerText = `${currentIndex}/${total}`;
    }

    function loadPage(index) {
        stopAllMedia();
        document.getElementById('popup-overlay').classList.add('hidden');
        document.getElementById('btn-popup-toggle').classList.add('invisible');
        document.getElementById('controls-area').classList.remove('hidden');

        if (index === 0) document.getElementById('btn-prev').classList.add('invisible');
        else document.getElementById('btn-prev').classList.remove('invisible');

        updateProgress();
        document.getElementById('btn-next-text').innerText = 'Suivant';
        document.getElementById('btn-next').disabled = false;

        switch (index) {
            case 0: renderPage0(); break;
            case 1: renderPage1(); break;
            case 2: renderPage2(); break;
            case 3: renderPage3(); break;
            case 4: renderPage4(); break;
            case 5: renderPage5(); break;
            case 6: renderPage6(); break;
        }
    }

    // ── PAGE 0: Intro ─────────────────────────────────────────────────────────────
    function renderPage0() {
        document.getElementById('content-area').innerHTML = `
            <div class="text-yellow-500 animate-fade-in"><i class="ph-fill ph-storefront text-icon"></i></div>
            <div class="flex flex-col items-center justify-center gap-2 w-full text-center">
                <h3 class="text-[clamp(0.75rem,2vw,1rem)] text-gray-500 font-bold uppercase m-0 tracking-wide">Mission débutant - Aller au convenience store</h3>
                <h1 class="text-title text-green-600 animate-fade-in m-0 leading-tight">Jeu de rôle : 스피드 쇼핑<br><span class="text-gray-700">Achats express</span></h1>
            </div>
        `;
        document.getElementById('btn-next-text').innerText = 'Commencer';
        document.getElementById('btn-next').disabled = false;
    }

    // ── PAGE 1: Mission brief ─────────────────────────────────────────────────────
    function renderPage1() {
        document.getElementById('content-area').innerHTML = `
            <div class="flex flex-col items-center w-full max-w-lg animate-fade-in" style="gap: clamp(1rem,3vh,2rem)">
                <h2 class="text-title text-green-600 m-0 text-center">Jeu de rôle : 스피드 쇼핑<br><span class="text-gray-600 text-[0.85em]">Achats express</span></h2>
                <div class="mission-box w-full text-center">
                    <p class="text-[clamp(0.75rem,1.8vw,0.9rem)] font-bold text-yellow-700 uppercase tracking-wider m-0 mb-2">Mission</p>
                    <p class="text-body m-0 font-semibold text-gray-800">편의점에 들어가서 초콜릿을 한 개 구매합니다.<br>결제를 하고 가게에서 나오면 됩니다.</p>
                </div>
                <div class="flex flex-col sm:flex-row gap-3 w-full">
                    <button id="btn-understood" class="flex-1 control-btn bg-green-500 text-white hover:bg-green-600 shadow-sm">
                        <i class="ph ph-check mr-2"></i>J'ai compris, c'est parti !
                    </button>
                    <button id="btn-explain" class="flex-1 control-btn bg-yellow-100 text-yellow-800 hover:bg-yellow-200">
                        <i class="ph ph-question mr-2"></i>Attends, je n'ai pas compris !
                    </button>
                </div>
            </div>
        `;
        document.getElementById('controls-area').classList.add('hidden');

        document.getElementById('btn-understood').onclick = async () => {
            await initSynths();
            if (transitionSynth) transitionSynth.triggerAttackRelease('E5', '0.05s');
            currentIndex = 2; loadPage(currentIndex);
        };
        document.getElementById('btn-explain').onclick = () => {
            document.getElementById('popup-content').innerHTML = `
                <div class="text-4xl">🛒</div>
                <p class="text-body text-center m-0 text-gray-700">Entrez dans un « 편의점 » et achetez un chocolat. Puis, payez et sortez du magasin.</p>
                <button id="btn-explain-ok" class="control-btn bg-green-500 text-white hover:bg-green-600 w-full max-w-[200px]">OK <i class="ph ph-check ml-1"></i></button>
            `;
            document.getElementById('popup-overlay').classList.remove('hidden');
            document.getElementById('btn-explain-ok').onclick = () => document.getElementById('popup-overlay').classList.add('hidden');
            document.getElementById('btn-close-popup').onclick = () => document.getElementById('popup-overlay').classList.add('hidden');
        };
    }

    // ── PAGE 2: Enter store ───────────────────────────────────────────────────────
    function renderPage2() {
        const state = pageStates[2];
        document.getElementById('content-area').innerHTML = `
            <div class="flex flex-col items-center gap-4 animate-fade-in w-full max-w-lg text-center">
                <div class="text-6xl">🏪</div>
                <p class="text-body text-gray-600 m-0">Vous êtes devant le convenience store.<br>Prêt(e) à entrer ?</p>
            </div>
        `;
        document.getElementById('btn-next-text').innerText = 'Entrer dans le magasin';

        if (state.audioPlayed) {
            document.getElementById('btn-popup-toggle').classList.remove('invisible');
            document.getElementById('btn-next').disabled = (state.isPassed || state.isSkipped || state.attemptsCount >= 2) ? false : true;
        }

        document.getElementById('btn-popup-toggle').onclick = () => page2ShowSpeaking();
    }

    function page2PlayCardAudio() {
        // 1강 showPopupSequence cardAudio 블록과 동일한 코드
        const overlay = document.getElementById('popup-overlay');
        overlay.classList.remove('hidden');
        const content = document.getElementById('popup-content');
        content.innerHTML = `
            <div class="flex flex-col items-center gap-2 w-full text-center flex-none">
                <h2 class="text-2xl md:text-3xl font-extrabold text-gray-800 m-0 break-words leading-tight w-full">어서 오세요.</h2>
                <p class="text-base md:text-lg text-gray-500 m-0 break-words leading-tight w-full">Bienvenue.</p>
            </div>
            <div class="flex items-center justify-center gap-4 w-full h-16 flex-none mt-4">
                <div id="popup-wave" class="audio-wave h-full w-full"><span></span><span></span><span></span><span></span></div>
            </div>
        `;
        document.getElementById('btn-close-popup').onclick = () => {
            overlay.classList.add('hidden');
            document.getElementById('btn-popup-toggle').classList.remove('invisible');
        };

        if (popupAudio) { popupAudio.pause(); popupAudio.currentTime = 0; }
        popupAudio = new Audio("https://res.cloudinary.com/de76i94ia/video/upload/v1774888007/S-2_o1flck.mp3");
        popupAudio.play().catch(e => console.log(e));
        popupAudio.onended = () => {
            const wave = document.getElementById('popup-wave');
            if (wave) wave.classList.add('hidden');
            setTimeout(() => page2ShowSpeaking(), 1000);
        };
    }

    function page2ShowSpeaking() {
        const state = pageStates[2];
        document.getElementById('popup-overlay').classList.remove('hidden');
        renderSpeakingTask(
            { krTextBlank: '_____?', krTextFull: '안녕하세요?', frText: 'Bonjour', reference: '안녕하세요', threshold: 90 },
            state, 2,
            () => {
                document.getElementById('btn-popup-toggle').classList.remove('invisible');
                document.getElementById('btn-next').disabled = false;
                document.getElementById('btn-next').onclick = null;
                currentIndex = 3; loadPage(currentIndex);
            }
        );
    }

    // ── PAGE 3: Choose item ───────────────────────────────────────────────────────
    function renderPage3() {
        const items = ['🍫', '🥐', '🍔', '☕️', '🍙'];
        document.getElementById('content-area').innerHTML = `
            <div class="flex flex-col items-center animate-fade-in w-full max-w-lg" style="gap: clamp(1rem,3vh,2rem)">
                <div class="mission-box text-center w-full">
                    <p class="text-[clamp(0.75rem,1.8vw,0.9rem)] font-bold text-yellow-700 uppercase tracking-wider m-0 mb-1">Mission</p>
                    <p class="text-body font-semibold text-gray-800 m-0">Choisissez l'article à acheter.</p>
                </div>
                <div class="flex items-center justify-center gap-3 flex-wrap w-full">
                    ${items.map(item => `<button class="item-btn" data-item="${item}">${item}</button>`).join('')}
                </div>
                <div id="proceed-btn-area" class="w-full flex justify-center" style="min-height: clamp(2.5rem,6vh,3.5rem)"></div>
            </div>
        `;
        document.getElementById('controls-area').classList.add('hidden');

        if (selectedItems.length > 0) {
            selectedItems.forEach(it => {
                const b = document.querySelector(`[data-item="${it}"]`);
                if (b) b.classList.add('selected');
            });
            renderProceedBtn();
        }

        document.querySelectorAll('.item-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const item = btn.getAttribute('data-item');
                if (btn.classList.contains('selected')) {
                    btn.classList.remove('selected');
                    selectedItems = selectedItems.filter(i => i !== item);
                } else {
                    btn.classList.add('selected');
                    if (!selectedItems.includes(item)) selectedItems.push(item);
                }
                if (selectedItems.length > 0) renderProceedBtn();
                else document.getElementById('proceed-btn-area').innerHTML = '';
            });
        });
    }

    function renderProceedBtn() {
        document.getElementById('proceed-btn-area').innerHTML = `
            <button id="btn-proceed" class="control-btn bg-green-500 text-white hover:bg-green-600 shadow-sm">
                <i class="ph ph-shopping-cart mr-2"></i>J'ai fini de choisir. Je vais passer à la caisse
            </button>
        `;
        document.getElementById('btn-proceed').onclick = () => {
            if (transitionSynth) transitionSynth.triggerAttackRelease('E5', '0.05s');
            pageStates[4].audioPlayed = true; // loadPage에서 오디오 재생 안 하도록 미리 표시
            currentIndex = 4;
            loadPage(currentIndex);
            // loadPage의 stopAllMedia() 이후에 재생 — gesture context는 동기 코드라 유지됨
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            currentAudio = new Audio("https://res.cloudinary.com/de76i94ia/video/upload/v1775377285/S-6_zipywh.wav");
            currentAudio.play().catch(e => console.log(e));
            currentAudio.onended = () => {
                const wrap = document.getElementById('cashier-wave-wrap');
                if (wrap) wrap.classList.add('hidden');
            };
        };
    }

    // ── PAGE 4: Payment ───────────────────────────────────────────────────────────
    function renderPage4() {
        document.getElementById('content-area').innerHTML = `
            <div class="flex flex-col items-center animate-fade-in w-full max-w-lg" style="gap: clamp(1rem,3vh,2rem)">
                <div class="flex flex-col items-center gap-3 bg-gray-50 rounded-2xl border-2 border-gray-200 p-5 w-full">
                    <div class="text-5xl">💵</div>
                    <p class="text-[clamp(1rem,3vw,1.3rem)] font-bold text-gray-800 m-0">3000 KRW</p>
                    <div id="cashier-wave-wrap" class="flex items-center justify-center h-8 w-full">
                        <div class="audio-wave h-full w-24"><span></span><span></span><span></span><span></span></div>
                    </div>
                </div>
                <div class="mission-box text-center w-full">
                    <p class="text-body font-semibold text-gray-700 m-0">Carte de crédit ou espèces ?</p>
                </div>
                <div class="flex gap-5 justify-center w-full">
                    <button class="payment-btn" data-pay="card" id="pay-card">💳</button>
                    <button class="payment-btn" data-pay="cash" id="pay-cash">💵</button>
                </div>
                <div id="pay-proceed-area" class="w-full flex justify-center" style="min-height: clamp(2.5rem,6vh,3.5rem)"></div>
            </div>
        `;
        document.getElementById('controls-area').classList.add('hidden');

        // 1강 playMainAudio 패턴: audioPlayed 체크 후 1회만 재생
        if (!pageStates[4].audioPlayed) {
            pageStates[4].audioPlayed = true;
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            currentAudio = new Audio("https://res.cloudinary.com/de76i94ia/video/upload/v1775377285/S-6_zipywh.wav");
            currentAudio.play().catch(e => console.log(e));
            currentAudio.onended = () => {
                const wrap = document.getElementById('cashier-wave-wrap');
                if (wrap) wrap.classList.add('hidden');
            };
        } else {
            const wrap = document.getElementById('cashier-wave-wrap');
            if (wrap) wrap.classList.add('hidden');
        }

        if (selectedPayment) {
            const b = document.querySelector(`[data-pay="${selectedPayment}"]`);
            if (b) { b.classList.add('selected'); renderVoiciBtn(); }
        }

        document.querySelectorAll('.payment-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedPayment = btn.getAttribute('data-pay');
                renderVoiciBtn();
            });
        });
    }

    function renderVoiciBtn() {
        document.getElementById('pay-proceed-area').innerHTML = `
            <button id="btn-voici" class="control-btn bg-blue-500 text-white hover:bg-blue-600 shadow-sm">
                <i class="ph ph-hand-pointing mr-2"></i>Voici !
            </button>
        `;
        document.getElementById('btn-voici').onclick = () => {
            if (transitionSynth) transitionSynth.triggerAttackRelease('E5', '0.05s');
            currentIndex = 5;
            stopAllMedia();
            document.getElementById('popup-overlay').classList.add('hidden');
            document.getElementById('btn-popup-toggle').classList.add('invisible');
            document.getElementById('controls-area').classList.remove('hidden');
            document.getElementById('btn-prev').classList.remove('invisible');
            updateProgress();
            document.getElementById('btn-next-text').innerText = 'Suivant';
            document.getElementById('btn-next').disabled = true;
            document.getElementById('content-area').innerHTML = `
                <div class="text-body text-center text-gray-600 animate-fade-in max-w-md">
                    La transaction est terminée. Le caissier vous dit au revoir !
                </div>
            `;
            document.getElementById('btn-popup-toggle').onclick = () => page5ShowSpeaking();
            const state = pageStates[5];
            if (!state.audioPlayed) {
                state.audioPlayed = true;
                page5PlayCardAudio();
            } else {
                document.getElementById('btn-popup-toggle').classList.remove('invisible');
                if (state.isPassed || state.isSkipped || state.attemptsCount >= 2) {
                    document.getElementById('btn-next').disabled = false;
                }
            }
        };
    }

    // ── PAGE 5: Goodbye ───────────────────────────────────────────────────────────
    // 1강 text-audio-complex-popup 패턴과 동일:
    // 페이지 진입 → cardAudio(감사합니다) 재생 → onended → speaking task
    function renderPage5() {
        const state = pageStates[5];
        document.getElementById('content-area').innerHTML = `
            <div class="text-body text-center text-gray-600 animate-fade-in max-w-md">
                La transaction est terminée. Le caissier vous dit au revoir !
            </div>
        `;
        document.getElementById('controls-area').classList.remove('hidden');
        document.getElementById('btn-next').disabled = true;

        if (!state.audioPlayed) {
            state.audioPlayed = true;
            page5PlayCardAudio();
        } else {
            document.getElementById('btn-popup-toggle').classList.remove('invisible');
            if (state.isPassed || state.isSkipped || state.attemptsCount >= 2) {
                document.getElementById('btn-next').disabled = false;
            }
        }

        document.getElementById('btn-popup-toggle').onclick = () => page5ShowSpeaking();
    }

    function page5PlayCardAudio() {
        // 1강 showPopupSequence cardAudio 블록과 동일한 코드
        const overlay = document.getElementById('popup-overlay');
        overlay.classList.remove('hidden');
        const content = document.getElementById('popup-content');
        content.innerHTML = `
            <div class="flex flex-col items-center gap-2 w-full text-center flex-none">
                <h2 class="text-2xl md:text-3xl font-extrabold text-gray-800 m-0 break-words leading-tight w-full">감사합니다, 안녕히 가세요!</h2>
                <p class="text-base md:text-lg text-gray-500 m-0 break-words leading-tight w-full">Merci, au revoir !</p>
            </div>
            <div class="flex items-center justify-center gap-4 w-full h-16 flex-none mt-4">
                <div id="popup-wave" class="audio-wave h-full w-full"><span></span><span></span><span></span><span></span></div>
            </div>
        `;
        document.getElementById('btn-close-popup').onclick = () => {
            overlay.classList.add('hidden');
            document.getElementById('btn-popup-toggle').classList.remove('invisible');
        };

        if (popupAudio) { popupAudio.pause(); popupAudio.currentTime = 0; }
        popupAudio = new Audio("https://res.cloudinary.com/de76i94ia/video/upload/v1774888051/S-4_a2ludm.mp3");
        popupAudio.play().catch(e => console.log(e));
        popupAudio.onended = () => {
            const wave = document.getElementById('popup-wave');
            if (wave) wave.classList.add('hidden');
            setTimeout(() => page5ShowSpeaking(), 1000);
        };
    }

    function page5ShowSpeaking() {
        const state = pageStates[5];
        document.getElementById('popup-overlay').classList.remove('hidden');
        renderSpeakingTask(
            { krTextBlank: '___ ___.', krTextFull: '안녕히 계세요.', frText: 'Au revoir', reference: '안녕히 계세요', threshold: 80 },
            state, 5,
            () => {
                document.getElementById('btn-popup-toggle').classList.remove('invisible');
                document.getElementById('btn-next').disabled = false;
                currentIndex = 6; loadPage(currentIndex);
            }
        );
    }

    // ── PAGE 6: Outro ─────────────────────────────────────────────────────────────
    function renderPage6() {
        document.getElementById('controls-area').classList.add('hidden');
        const onlyChocolate = selectedItems.length === 1 && selectedItems[0] === '🍫';

        if (onlyChocolate) {
            if (completionSynth) completionSynth.triggerAttackRelease(["C5", "E5", "G5", "C6"], "4n");
            document.getElementById('content-area').innerHTML = `
                <div class="flex flex-col items-center gap-5 animate-pop-in text-center max-w-md px-2">
                    <div class="text-[clamp(3rem,10vw,5rem)]">🥳</div>
                    <div class="bg-green-50 border-2 border-green-300 rounded-2xl p-6 w-full">
                        <p class="text-[clamp(1rem,3vw,1.25rem)] font-bold text-green-700 m-0 leading-relaxed">
                            <span class="text-[clamp(1.2rem,4vw,1.5rem)] font-extrabold block mb-2">Félicitations 🥳</span>
                            Vous avez réussi votre premier achat ! Maintenant, vous pouvez passez au Chapitre 2 avec confiance.
                        </p>
                    </div>
                </div>
            `;
        } else {
            if (errorSynth) {
                const now = Tone.now();
                errorSynth.triggerAttackRelease("A3", "0.3s", now);
                errorSynth.triggerAttackRelease("F3", "0.3s", now + 0.35);
                errorSynth.triggerAttackRelease("D3", "0.5s", now + 0.7);
            }
            document.getElementById('content-area').innerHTML = `
                <div class="flex flex-col items-center gap-5 animate-pop-in text-center max-w-md px-2">
                    <div class="text-[clamp(3rem,10vw,5rem)]">🥲</div>
                    <div class="bg-yellow-50 border-2 border-yellow-300 rounded-2xl p-6 w-full">
                        <p class="text-[clamp(1rem,3vw,1.25rem)] font-bold text-yellow-800 m-0 leading-relaxed">
                            <span class="text-[clamp(1.2rem,4vw,1.5rem)] font-extrabold block mb-2">Quel dommage 🥲</span>
                            Cette mission consistait à choisir un 🍫. Mais ce n'est pas grave ! N'hésitez pas à retenter la prochaine fois.
                        </p>
                    </div>
                </div>
            `;
        }

        window.parent.postMessage({ type: 'lesson_complete' }, '*');
    }

    // ── Speaking task 렌더러 ───────────────────────────────────────────────────────
    // 1강 renderTask의 isSpeaking 브랜치와 동일한 구조
    function renderSpeakingTask(taskData, state, pageIndex, onContinue) {
        const content = document.getElementById('popup-content');
        const isRecordDisabled = state.isPassed || state.attemptsCount >= 2;
        const nextBtnDisabledAttr = (state.isPassed || state.attemptsCount >= 2) ? '' : 'disabled';
        const nextBtnOpacityClass = (state.isPassed || state.attemptsCount >= 2) ? '' : 'opacity-50 cursor-not-allowed';
        const defaultStatus = 'Appuyez sur le micro pour parler';
        const statusHtml = state.attemptsCount > 0 ? state.lastStatusHtml : (state.isPassed ? 'Très bien ! Passez à la suite.' : defaultStatus);
        const statusClass = state.attemptsCount > 0 ? state.lastStatusClass : (state.isPassed ? 'text-green-500' : 'text-gray-500');
        const targetText = (state.attemptsCount > 0 || state.isPassed) ? taskData.krTextFull : taskData.krTextBlank;

        content.innerHTML = `
            <div class="flex flex-col items-center gap-2 w-full text-center">
                <h2 id="task-target" class="text-2xl md:text-3xl font-extrabold text-gray-800 m-0">${targetText}</h2>
                <p class="text-base md:text-lg text-gray-500 m-0">${taskData.frText}</p>
            </div>
            <div class="flex items-center justify-center gap-5 w-full h-16">
                <button id="btn-popup-record" class="w-16 h-16 ${isRecordDisabled ? 'bg-gray-300 pointer-events-none' : 'bg-green-500 hover:bg-green-600'} text-white rounded-full flex items-center justify-center shadow-lg transition-all" ${isRecordDisabled ? 'disabled' : ''}><i class="ph-fill ph-microphone text-3xl"></i></button>
            </div>
            <div class="flex items-center justify-center min-h-[3rem] w-full">
                <p id="popup-status" class="text-sm font-bold ${statusClass} text-center w-full m-0">${statusHtml}</p>
            </div>
            <button id="btn-popup-next" class="px-6 py-3 bg-blue-500 text-white rounded-full font-bold shadow-md hover:bg-blue-600 w-full max-w-[200px] flex items-center justify-center transition-opacity duration-300 ${nextBtnOpacityClass}" ${nextBtnDisabledAttr}>Continuer <i class="ph ph-arrow-right ml-2"></i></button>
        `;

        document.getElementById('btn-close-popup').onclick = () => {
            document.getElementById('popup-overlay').classList.add('hidden');
            document.getElementById('btn-popup-toggle').classList.remove('invisible');
            document.getElementById('btn-next').disabled = (state.isPassed || state.isSkipped || state.attemptsCount >= 2) ? false : true;
        };

        document.getElementById('btn-popup-record').onclick = () => toggleRecording(taskData, document.getElementById('btn-popup-record'), pageIndex);
        document.getElementById('btn-popup-next').onclick = () => {
            document.getElementById('popup-overlay').classList.add('hidden');
            if (!state.isPassed && state.attemptsCount < 2) state.isSkipped = true;
            if (onContinue) onContinue();
        };
    }

    // ── 녹음 + 평가 ───────────────────────────────────────────────────────────────
    async function toggleRecording(taskData, btnEl, pageIndex) {
        if (btnEl.disabled || btnEl.classList.contains('pointer-events-none')) return;
        if (isRecording) {
            stopRecording();
            btnEl.innerHTML = `<i class="ph-fill ph-spinner-gap animate-spin text-3xl"></i>`;
            return;
        }
        if (popupAudio) { popupAudio.pause(); popupAudio.currentTime = 0; }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                stream.getTracks().forEach(track => track.stop());
                processAudio(blob, taskData, btnEl, pageIndex);
            };
            mediaRecorder.start(); isRecording = true;
            btnEl.classList.add('recording-pulse'); btnEl.innerHTML = `<i class="ph-fill ph-stop text-3xl"></i>`;
            setTimeout(() => { if (isRecording) { stopRecording(); btnEl.innerHTML = `<i class="ph-fill ph-spinner-gap animate-spin text-3xl"></i>`; } }, 6000);
            const st = document.getElementById('popup-status');
            if (st) { st.innerHTML = `<div class="audio-wave h-full mt-1"><span></span><span></span><span></span><span></span></div>`; st.className = 'text-red-500 w-full text-center m-0'; }
        } catch (err) { alert("L'accès au microphone est requis."); }
    }

    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); isRecording = false; }
    }

    async function processAudio(blob, taskData, btnEl, pageIndex) {
        const reader = new FileReader(); reader.readAsDataURL(blob);
        reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            const refs = taskData.reference.split('|');
            let bestScore = 0; let apiSuccess = false;
            for (const r of refs) {
                try {
                    const res = await fetch(CLOVA_API_FUNCTION_URL, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ audioBase64: base64, languageCode: "Kor", referenceText: r, assessment: false })
                    });
                    if (res.ok) {
                        apiSuccess = true;
                        const json = await res.json();
                        const recognizedText = json.text || json.recognized || "";
                        const sim = calculateSimilarity(recognizedText, r);
                        if (sim > bestScore) bestScore = sim;
                    }
                } catch (e) { console.error(e); }
            }
            if (!apiSuccess) {
                const status = document.getElementById('popup-status');
                if (status) { status.innerHTML = "Erreur de connexion. Veuillez réessayer."; status.className = 'text-sm font-bold text-center w-full text-red-500 m-0'; }
                btnEl.innerHTML = `<i class="ph-fill ph-microphone text-3xl"></i>`; btnEl.classList.remove('recording-pulse');
                return;
            }
            evaluate(bestScore, taskData, btnEl, pageIndex);
        };
    }

    function evaluate(score, taskData, btnEl, pageIndex) {
        const state = pageStates[pageIndex];
        state.attemptsCount++;
        const att = state.attemptsCount;
        const threshold = taskData.threshold || 80;
        const baseClasses = 'text-sm md:text-base font-bold text-center w-full transition-colors m-0 leading-tight ';
        const scoreStr = `<br><span class="text-xs text-gray-400 font-normal mt-1 block">(Score: ${Math.round(score)})</span>`;

        btnEl.innerHTML = `<i class="ph-fill ph-microphone text-3xl"></i>`;
        btnEl.classList.remove('recording-pulse');

        const status = document.getElementById('popup-status');

        if (score >= threshold) {
            state.isPassed = true;
            if (status) { status.innerHTML = "Très bien ! Passez à la suite." + scoreStr; status.className = baseClasses + 'text-green-500'; }
            if (successSynth) successSynth.triggerAttackRelease(["E5", "G5", "C6"], "8n");
            const targetEl = document.getElementById('task-target');
            if (targetEl) targetEl.innerText = taskData.krTextFull;
            finishSpeakingTask(btnEl);
        } else {
            if (att < 2) {
                if (status) { status.innerHTML = "On y est presque ! Essayons encore une fois." + scoreStr; status.className = baseClasses + 'text-yellow-600'; }
                if (errorSynth) errorSynth.triggerAttackRelease("D3", "0.2s");
                const targetEl = document.getElementById('task-target');
                if (targetEl) targetEl.innerText = taskData.krTextFull;
            } else {
                state.isPassed = true;
                if (status) { status.innerHTML = "Bien essayé ! Passez à la suite." + scoreStr; status.className = baseClasses + 'text-gray-500'; }
                if (errorSynth) errorSynth.triggerAttackRelease("D3", "0.2s");
                finishSpeakingTask(btnEl);
            }
        }

        if (status) { state.lastStatusHtml = status.innerHTML; state.lastStatusClass = status.className; }
    }

    function finishSpeakingTask(btnEl) {
        btnEl.disabled = true;
        btnEl.classList.replace('bg-green-500', 'bg-gray-300');
        btnEl.classList.add('pointer-events-none');
        const bNextPop = document.getElementById('btn-popup-next');
        if (bNextPop) { bNextPop.disabled = false; bNextPop.classList.remove('opacity-50', 'cursor-not-allowed'); }
        document.getElementById('btn-next').disabled = false;
    }

    // ── 네비게이션 ────────────────────────────────────────────────────────────────
    window.addEventListener('beforeunload', stopAllMedia);

    document.getElementById('btn-next').addEventListener('click', async () => {
        if (currentIndex === 0) {
            // "Commencer" — synth 초기화를 여기서 완료해둠
            await initSynths();
            currentIndex = 1;
            loadPage(currentIndex);
            return;
        }

        if (currentIndex === 2) {
            const state = pageStates[2];
            if (state.audioPlayed) return;
            state.audioPlayed = true;
            document.getElementById('btn-next').disabled = true;
            bellSynth.triggerAttackRelease(["G5", "C6"], "8n", Tone.now());
            bellSynth.triggerAttackRelease(["E6"], "8n", Tone.now() + 0.15);
            page2PlayCardAudio();
            return;
        }

        if (transitionSynth) transitionSynth.triggerAttackRelease('E5', '0.05s');
        if (currentIndex !== 5) {
            currentIndex++;
            loadPage(currentIndex);
        }
    });

    document.getElementById('btn-prev').addEventListener('click', () => {
        if (currentIndex > 0) {
            if (transitionSynth) transitionSynth.triggerAttackRelease('C5', '0.05s');
            currentIndex--;
            loadPage(currentIndex);
        }
    });

    loadPage(0);
</script>
</body>
</html>

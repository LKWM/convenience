<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission débutant - Aller au convenience store</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Tone.js for Sounds -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        /* Prevent scrolling globally */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #FEFCE8; /* yellow-50 */
            touch-action: none;
            font-family: 'Inter', 'Noto Sans', sans-serif;
            color: #1F2937; /* gray-800 */
        }

        /* Responsive Container constraints */
        #app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .lesson-card {
            width: 90%;
            max-width: 800px;
            height: 85%;
            max-height: 600px;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border: 2px solid #FEF08A; /* yellow-200 */
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .recording-pulse {
            animation: pulse-red 1.5s infinite;
            background-color: #EF4444; /* red-500 */
            color: white;
        }

        .audio-wave {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 24px;
        }
        .audio-wave span {
            display: block;
            width: 4px;
            background-color: #22C55E; /* green-500 */
            border-radius: 2px;
            animation: wave 1s infinite ease-in-out;
        }
        .audio-wave span:nth-child(2) { animation-delay: 0.2s; }
        .audio-wave span:nth-child(3) { animation-delay: 0.4s; }
        .audio-wave span:nth-child(4) { animation-delay: 0.6s; }
        
        @keyframes wave {
            0%, 100% { height: 8px; }
            50% { height: 24px; }
        }

        /* Overlay */
        #popup-overlay {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Main Lesson Content Area -->
        <div id="lesson-view" class="lesson-card pt-6 px-6 pb-4 md:pt-10 md:px-10 md:pb-5">
            <!-- Content Area -->
            <div id="content-area" class="flex-1 flex flex-col items-center justify-center text-center space-y-6">
                <!-- Dynamically injected content -->
            </div>

            <!-- Bottom Control Area -->
            <div id="controls-area" class="w-full mt-auto pt-3 flex flex-col items-center border-t border-gray-100">
                <!-- Integrated Progress Bar -->
                <div id="progress-container" class="hidden w-full mb-3 px-1">
                    <div class="flex justify-end text-xs text-gray-400 mb-1 font-semibold tracking-wider">
                        <span id="progress-text">1/11</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-1">
                        <div id="progress-bar" class="bg-green-500 h-1 rounded-full transition-all duration-300" style="width: 10%"></div>
                    </div>
                </div>

                <div class="w-full flex justify-between items-center gap-2">
                    <button id="btn-prev" class="hidden px-3 py-1.5 bg-gray-100 text-gray-600 rounded-lg font-medium hover:bg-gray-200 transition-colors flex items-center text-sm">
                        <i class="ph ph-arrow-left mr-1 text-base"></i> <span class="hidden md:inline">Précédent</span>
                    </button>
                    
                    <button id="btn-popup-toggle" class="hidden px-3 py-1.5 bg-yellow-100 text-yellow-700 rounded-lg font-medium hover:bg-yellow-200 transition-colors text-sm flex items-center">
                        <i class="ph ph-chat-centered-text mr-1 text-base"></i> <span class="hidden md:inline">Exercice</span>
                    </button>
                    
                    <div class="flex-1"></div>
                    
                    <button id="btn-next" class="px-4 py-1.5 bg-green-500 text-white rounded-lg font-bold shadow-sm hover:bg-green-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center text-sm">
                        Commencer <i class="ph ph-arrow-right ml-1 text-base"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Popup Overlay -->
        <div id="popup-overlay" class="absolute inset-0 z-50 hidden flex justify-center items-center">
            <div class="bg-white rounded-2xl shadow-2xl p-6 md:p-8 w-[85%] max-w-[500px] flex flex-col items-center text-center animate-fade-in relative border-4 border-yellow-400">
                <button id="btn-close-popup" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700">
                    <i class="ph ph-x text-2xl"></i>
                </button>
                
                <div id="popup-content" class="w-full mt-4 flex flex-col items-center space-y-6">
                    <!-- Injected Popup Content -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Lesson Data ---
        const lessonData = [
            {

                audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774887402/1-1_xovugt.wav"

                audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774887425/1-2_ivvml7.wav",
                popup: {
                    type: 'repeat',
                    krText: "편의점",

                    audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774887958/%E1%84%91%E1%85%A7%E1%86%AB%E1%84%8B%E1%85%B4%E1%84%8C%E1%85%A5%E1%86%B7_erub8c.wav",

            {

                text: "Ensuite, c'est à votre tour de saluer le caissier.",
                audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888330/1-7_tbi6et.mp3",
                popup: {
                    type: 'repeat',
                    krText: "안녕히 계세요.",
                    frText: "Au revoir",

                }
            },
            {
                id: 9, type: 'text-audio-complex-popup',
                text: "Très bien ! Nous allons répéter les salutations que nous venons de voir. Répondez au caissier en coréen.",
                audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888331/1-8_n4agzw.mp3",
                cardAudio: {
                    krText: "어서 오세요.",
                    frText: "Bienvenue.",
                    audio: "" // Missing audio link in prompt, will fallback to 1-4 popup audio
                },
                popup: {
                    type: 'speaking',
                    krTextBlank: "_____?",
                    krTextFull: "안녕하세요?",
                    frText: "Bonjour",
                    reference: "안녕하세요",
                    audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888032/S-3_w316i0.wav"
                }
            },
            {
                id: 10, type: 'text-audio-complex-popup',
                text: "Cette fois-ci, dites au revoir et sortez du magasin.",
                audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888332/1-9_bhb8dx.mp3",
                cardAudio: {
                    krText: "감사합니다, 안녕히 가세요.",
                    frText: "Merci, au revoir.",
                    audio: "" // Missing audio link in prompt, will fallback to 1-6 popup audio
                },
                popup: {
                    type: 'speaking',
                    krTextBlank: "___ ___.",
                    krTextFull: "안녕히 계세요.",
                    frText: "Au revoir",
                    reference: "안녕히 계세요",
                    audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888071/S-5_cfeudu.wav"
                }
            },
            {
                id: 10, type: 'text-audio-complex-popup',
                text: "Cette fois-ci, dites au revoir et sortez du magasin.",
                audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888332/1-9_bhb8dx.mp3",
                cardAudio: {
                    krText: "감사합니다, 안녕히 가세요.",
                    frText: "Merci, au revoir.",
                    audio: "" // Missing audio link in prompt, will fallback to 1-6 popup audio
                },
                popup: {
                    type: 'speaking',
                    krTextBlank: "___ ___.",
                    krTextFull: "안녕히 계세요.",
                    frText: "Au revoir",
                    reference: "안녕히 계세요"
                }
            },
            {
                id: 11, type: 'outro',
                text: "Fantastique ! Comme c'est la toute première leçon, nous avons juste fait un petit échauffement avec des salutations simples. Dans la prochaine leçon, nous nous entraînerons à régler à la caisse de manière naturelle dans un « 편의점 » coréen ! Alors, à tout de suite !",
                audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888333/1-10_qfsvxs.wav"
            }
        ];

        // --- App State ---
        let currentIndex = 0;
        let currentAudio = null;
        let popupAudio = null;
        
        let correctSound, completionSynth, transitionSynth, successSynth;
        
        // Page states for Backwards Navigation 
        let pageStates = lessonData.map(() => ({
            isPassed: false,
            attemptsCount: 0
        }));
        
        // Recording state
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        const BASE_44_ORIGIN = "https://coreeno.base44.app"; 
        const CLOVA_API_FUNCTION_URL = BASE_44_ORIGIN + '/api/functions/naverClovaSpeech';

        // --- DOM Elements ---
        const contentArea = document.getElementById('content-area');
        const progressContainer = document.getElementById('progress-container');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');
        const btnNext = document.getElementById('btn-next');
        const btnPrev = document.getElementById('btn-prev');
        const btnPopupToggle = document.getElementById('btn-popup-toggle');
        const popupOverlay = document.getElementById('popup-overlay');
        const popupContent = document.getElementById('popup-content');
        const btnClosePopup = document.getElementById('btn-close-popup');
        const controlsArea = document.getElementById('controls-area');

        // --- Init Audio Context (Must be attached to user interaction) ---
        async function initSynths() {
            if(!correctSound) {
                await Tone.start();
                correctSound = new Tone.Synth().toDestination();
                completionSynth = new Tone.PolySynth(Tone.Synth).toDestination();
                successSynth = new Tone.PolySynth(Tone.Synth).toDestination();
                transitionSynth = new Tone.Synth({
                    oscillator: { type: 'sine' },
                    envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 }
                }).toDestination();
                transitionSynth.volume.value = -10;
            }
        }

        // --- Core Rendering ---
        function updateProgress() {
            if (currentIndex === 0 || currentIndex === lessonData.length - 1) {
                progressContainer.classList.add('hidden');
            } else {
                progressContainer.classList.remove('hidden');
                const pct = (currentIndex / (lessonData.length - 2)) * 100;
                progressBar.style.width = `${pct}%`;
                progressText.innerText = `${currentIndex}/${lessonData.length - 2}`;
            }
        }

        function stopCurrentAudios() {
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            if (popupAudio) { popupAudio.pause(); popupAudio.currentTime = 0; }
        }

        function loadPage(index) {
            stopCurrentAudios();
            popupOverlay.classList.add('hidden');
            btnPopupToggle.classList.add('hidden');
            
            // Back button state logic
            btnNext.disabled = !pageStates[index].isPassed; 

            if (index > 0) {
                btnPrev.classList.remove('hidden');
            } else {
                btnPrev.classList.add('hidden');
            }

            const data = lessonData[index];
            updateProgress();

            if (data.type === 'intro') {
                contentArea.innerHTML = `
                    <div class="text-yellow-500 mb-4 animate-fade-in"><i class="ph-fill ph-storefront text-6xl"></i></div>
                    <h3 class="text-sm md:text-base text-gray-500 font-bold tracking-wide animate-fade-in uppercase">${data.subtitle}</h3>
                    <h1 class="text-3xl md:text-4xl font-extrabold text-green-600 mt-2 mb-8 animate-fade-in delay-100">${data.title}</h1>
                `;
                btnNext.innerHTML = `${data.buttonText} <i class="ph ph-arrow-right ml-1 text-base"></i>`;
                btnNext.disabled = false;
                controlsArea.classList.remove('hidden');
            } 
            else if (data.type === 'outro') {
                // Outro page - Finish the lesson immediately
                controlsArea.classList.add('hidden');
                contentArea.innerHTML = `
                    <div class="text-yellow-500 mb-4 animate-fade-in"><i class="ph-fill ph-confetti text-6xl"></i></div>
                    <div class="text-lg md:text-xl text-gray-700 leading-relaxed max-w-2xl text-center animate-fade-in">
                        ${data.text}
                    </div>
                `;
                if (completionSynth) completionSynth.triggerAttackRelease(["C5", "E5", "G5", "C6"], "4n");
                window.parent.postMessage({ type: 'lesson_complete' }, '*');
                playMainAudio(data);
                return;
            }
            else if (data.type === 'text-audio' || data.type === 'text-audio-popup' || data.type === 'text-audio-complex-popup') {
                btnNext.innerHTML = `Suivant <i class="ph ph-arrow-right ml-1 text-base"></i>`;
                controlsArea.classList.remove('hidden');

                contentArea.innerHTML = `
                    <div class="text-lg md:text-xl text-gray-700 leading-relaxed max-w-2xl text-center animate-fade-in">
                        ${data.text}
                    </div>
                `;

                if (!data.type.includes('popup')) {
                    btnNext.disabled = false;
                    pageStates[index].isPassed = true;
                }

                playMainAudio(data);
            }
        }

        function playMainAudio(data, onEndCallback = null) {
            if(!data.audio) return;
            
            currentAudio = new Audio(data.audio);
            currentAudio.play().catch(e => console.error("Audio auto-play blocked", e));
            
            currentAudio.onended = () => {
                if (data.type.includes('popup')) {
                    showPopupSequence(data);
                    btnPopupToggle.classList.remove('hidden');
                }
                if(onEndCallback) onEndCallback();
            };
        }

        // --- Popup Logic ---
        function showPopupSequence(lessonObj) {
            popupOverlay.classList.remove('hidden');
            
            // Complex Popup handling (Pages 9 & 10)
            if (lessonObj.type === 'text-audio-complex-popup' && !pageStates[currentIndex].isPassed) {
                // Fallback for missing audio
                let audioUrl = lessonObj.cardAudio.audio || (currentIndex === 8 ? lessonData[4].popup.audio : lessonData[6].popup.audio);
                
                popupContent.innerHTML = `
                    <div class="text-yellow-500 mb-2"><i class="ph-fill ph-speaker-high text-5xl"></i></div>
                    <h2 class="text-3xl font-extrabold text-gray-800">${lessonObj.cardAudio.krText}</h2>
                    <p class="text-lg text-gray-500 mt-1">${lessonObj.cardAudio.frText}</p>
                    <div id="popup-wave" class="mt-6 audio-wave"><span></span><span></span><span></span><span></span></div>
                `;
                
                if(popupAudio) { popupAudio.pause(); popupAudio.currentTime = 0; }
                popupAudio = new Audio(audioUrl);
                popupAudio.play().catch(e=>console.log(e));
                
                popupAudio.onended = () => {
                    document.getElementById('popup-wave').classList.add('hidden');
                    // 2초 뒤 말하기 카드로 전환
                    setTimeout(() => {
                        renderPopupContent(lessonObj.popup);
                    }, 2000);
                };
            } else {
                // Standard Popup or already passed Complex Popup
                renderPopupContent(lessonObj.popup || lessonObj);
            }
        }

        function renderPopupContent(popupData) {
            let contentHtml = '';
            const state = pageStates[currentIndex];

            if(popupData.type === 'audio-only') {
                contentHtml = `
                    <div class="text-yellow-500 mb-2"><i class="ph-fill ph-speaker-high text-5xl"></i></div>
                    <h2 class="text-3xl font-extrabold text-gray-800">${popupData.krText}</h2>
                    <p class="text-lg text-gray-500 mt-1">${popupData.frText}</p>
                    <button id="btn-popup-play" class="mt-6 px-6 py-3 bg-green-500 text-white rounded-full font-bold shadow hover:bg-green-600 flex items-center">
                        <i class="ph-fill ph-play mr-2"></i> Écouter
                    </button>
                    <button id="btn-popup-next" class="mt-4 px-6 py-3 bg-blue-500 text-white rounded-full font-bold shadow hover:bg-blue-600 ${state.isPassed ? '' : 'hidden'} flex items-center">
                        Suivant <i class="ph ph-arrow-right ml-2"></i>
                    </button>
                `;
            } 
            else if (popupData.type === 'repeat') {
                let consigneText = state.isPassed ? "Parfait !" : (state.attemptsCount === 1 ? "Essayons encore une fois !" : "Répétez après moi !");
                contentHtml = `
                    <h2 class="text-3xl font-extrabold text-gray-800">${popupData.krText}</h2>
                    <p class="text-lg text-gray-500 mt-1">${popupData.frText}</p>
                    <p id="popup-consigne" class="text-blue-500 font-bold mt-3 text-lg">${consigneText}</p>
                    
                    <div class="flex items-center space-x-4 mt-4">
                        <button id="btn-popup-play" class="w-14 h-14 bg-yellow-400 text-yellow-900 rounded-full flex items-center justify-center shadow-md hover:bg-yellow-500 transition-colors">
                            <i class="ph-fill ph-play text-2xl"></i>
                        </button>
                        <button id="btn-popup-record" class="w-14 h-14 ${state.isPassed ? 'bg-gray-300' : 'bg-green-500 hover:bg-green-600'} text-white rounded-full flex items-center justify-center shadow-md transition-all" ${state.isPassed ? 'disabled' : ''}>
                            <i class="ph-fill ph-microphone text-2xl"></i>
                        </button>
                    </div>
                    <p id="popup-status" class="mt-4 text-sm font-medium ${state.isPassed ? 'text-green-500 font-bold' : 'text-gray-500'} h-5">
                        ${state.isPassed ? 'Déjà terminé !' : `Appuyez sur le micro pour parler (${state.attemptsCount}/2)`}
                    </p>
                    <button id="btn-popup-next" class="mt-4 px-6 py-2 bg-blue-500 text-white rounded-full font-bold shadow hover:bg-blue-600 ${state.isPassed ? '' : 'hidden'} flex items-center">
                        Suivant <i class="ph ph-arrow-right ml-2"></i>
                    </button>
                `;
            }
            else if (popupData.type === 'speaking') {
                let showFullText = state.isPassed || state.attemptsCount >= 1;
                contentHtml = `
                    <h2 id="speaking-target" class="text-3xl font-extrabold text-gray-800 tracking-wider">${showFullText ? popupData.krTextFull : popupData.krTextBlank}</h2>
                    <p class="text-lg text-gray-500 mt-1">${popupData.frText}</p>
                    
                    <div class="flex items-center space-x-4 mt-6">
                        <button id="btn-popup-play" class="w-14 h-14 bg-yellow-400 text-yellow-900 rounded-full flex items-center justify-center shadow-md hover:bg-yellow-500 transition-colors ${showFullText ? '' : 'hidden'}">
                            <i class="ph-fill ph-play text-2xl"></i>
                        </button>
                        <button id="btn-popup-record" class="w-16 h-16 ${state.isPassed ? 'bg-gray-300' : 'bg-green-500 hover:bg-green-600 hover:scale-105'} text-white rounded-full flex items-center justify-center shadow-lg transition-all transform" ${state.isPassed ? 'disabled' : ''}>
                            <i class="ph-fill ph-microphone text-3xl"></i>
                        </button>
                    </div>
                    <p id="popup-status" class="mt-4 text-sm font-medium ${state.isPassed ? 'text-green-500 font-bold' : 'text-gray-500'} h-5">
                        ${state.isPassed ? 'Déjà terminé !' : `Appuyez pour répondre (${state.attemptsCount}/2)`}
                    </p>
                    <button id="btn-popup-next" class="mt-4 px-6 py-2 bg-blue-500 text-white rounded-full font-bold shadow hover:bg-blue-600 ${state.isPassed ? '' : 'hidden'} flex items-center">
                        Suivant <i class="ph ph-arrow-right ml-2"></i>
                    </button>
                `;
            }

            popupContent.innerHTML = contentHtml;
            btnPopupToggle.classList.remove('hidden');

            // Attach listeners
            const btnPlay = document.getElementById('btn-popup-play');
            const btnRecord = document.getElementById('btn-popup-record');
            const btnPopupNext = document.getElementById('btn-popup-next');

            if(btnPopupNext) {
                btnPopupNext.onclick = () => {
                    popupOverlay.classList.add('hidden');
                    if(btnNext && !btnNext.disabled) {
                        btnNext.click(); // Proceed to next page immediately
                    }
                };
            }

            if(btnPlay && popupData.audio) {
                btnPlay.onclick = () => {
                    // 녹음 버튼 비활성화
                    if(btnRecord && !state.isPassed) {
                        btnRecord.disabled = true;
                        btnRecord.classList.add('opacity-50', 'cursor-not-allowed');
                    }

                    if(popupAudio) { popupAudio.pause(); popupAudio.currentTime = 0; }
                    popupAudio = new Audio(popupData.audio);
                    popupAudio.play();
                    
                    const originalIcon = btnPlay.innerHTML;
                    if(popupData.type === 'audio-only') {
                        btnPlay.innerHTML = `<div class="audio-wave"><span></span><span></span><span></span><span></span></div>`;
                    } else {
                        btnPlay.innerHTML = `<i class="ph-fill ph-speaker-high text-2xl"></i>`;
                    }

                    popupAudio.onended = () => {
                        btnPlay.innerHTML = originalIcon; // 원래 아이콘 복원 (무한 재생 가능)
                        
                        // 녹음 버튼 재활성화
                        if(btnRecord && !state.isPassed) {
                            btnRecord.disabled = false;
                            btnRecord.classList.remove('opacity-50', 'cursor-not-allowed');
                        }

                        if (popupData.type === 'audio-only') {
                            state.isPassed = true;
                            btnNext.disabled = false;
                            if(btnPopupNext) btnPopupNext.classList.remove('hidden');
                        }
                    };
                };

                // 자동 재생 처리 (이미 통과한 페이지가 아닐 경우에만)
                if (!state.isPassed && (popupData.type === 'repeat' || popupData.type === 'audio-only')) {
                    setTimeout(() => { btnPlay.click(); }, 300);
                }
            }

            if(btnRecord) {
                btnRecord.onclick = () => toggleRecording(popupData, btnRecord);
            }
        }

        btnClosePopup.onclick = () => {
            popupOverlay.classList.add('hidden');
        };

        btnPopupToggle.onclick = () => {
            popupOverlay.classList.remove('hidden');
        };

        // --- Speech Recognition (Clova API) ---
        async function toggleRecording(popupData, btnEl) {
            if (isRecording) {
                stopRecording();
                btnEl.classList.remove('recording-pulse');
                btnEl.innerHTML = `<i class="ph-fill ph-spinner-gap animate-spin text-2xl"></i>`;
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' }); 
                    stream.getTracks().forEach(track => track.stop());
                    
                    await processAudioBlob(audioBlob, popupData, btnEl);
                };

                mediaRecorder.start();
                isRecording = true;
                btnEl.classList.add('recording-pulse');
                btnEl.innerHTML = `<i class="ph-fill ph-stop text-2xl"></i>`;
                
                const status = document.getElementById('popup-status');
                if(status) { status.innerText = "Écoute en cours..."; status.className = 'mt-4 text-sm font-medium text-red-500 h-5'; }

            } catch (err) {
                console.error("Mic access error:", err);
                alert("L'accès au microphone est requis pour cet exercice.");
            }
        }

        function stopRecording() {
            if(mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                isRecording = false;
            }
        }

        async function processAudioBlob(blob, popupData, btnEl) {
            const status = document.getElementById('popup-status');
            
            try {
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = async () => {
                    const base64data = reader.result.split(',')[1];
                    
                    try {
                        const res = await fetch(CLOVA_API_FUNCTION_URL, {
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                audioBase64: base64data, 
                                languageCode: "Kor", 
                                referenceText: popupData.reference 
                            })
                        });
                        
                        if (!res.ok) throw new Error("API Error");
                        const result = await res.json();
                        const score = result.assessment?.pronunciation_score || 0;
                        
                        handleEvaluation(score, popupData, btnEl, status);

                    } catch (apiError) {
                        console.error(apiError);
                        handleEvaluation(100, popupData, btnEl, status, true); 
                    }
                };
            } catch (err) {
                console.error("Processing error", err);
                handleEvaluation(0, popupData, btnEl, status);
            }
        }

        function handleEvaluation(score, popupData, btnEl, status, isFallback = false) {
            const state = pageStates[currentIndex];
            state.attemptsCount++;
            let attempts = state.attemptsCount;
            
            btnEl.innerHTML = `<i class="ph-fill ph-microphone text-2xl"></i>`;
            
            if (popupData.type === 'repeat') {
                const consigne = document.getElementById('popup-consigne');
                
                // 100점이어도 무조건 2번의 시도가 필요함
                if (attempts === 1) {
                    status.innerHTML = `Score: ${Math.round(score)} - Encore une fois ! (1/2)`;
                    status.className = 'mt-4 text-sm font-medium text-yellow-600 h-5';
                    if(consigne) consigne.innerText = "Essayons encore une fois !";
                    
                    // 1회차 완료 후 2회차 시작 전 오디오 자동 재생 (0.8초 딜레이로 자연스럽게)
                    const btnPlay = document.getElementById('btn-popup-play');
                    if (btnPlay) {
                        setTimeout(() => { btnPlay.click(); }, 800);
                    }
                } else if (attempts >= 2) {
                    // Passed
                    state.isPassed = true;
                    if(successSynth) successSynth.triggerAttackRelease(["E5", "G5", "C6"], "8n");
                    
                    status.innerHTML = `Excellent ! (Score: ${Math.round(score)} - 2/2)`;
                    status.className = 'mt-4 text-sm font-bold text-green-500 h-5';
                    if(consigne) consigne.innerText = "Parfait !";
                    
                    btnEl.disabled = true;
                    btnEl.classList.replace('bg-green-500', 'bg-gray-300');
                    btnNext.disabled = false;
                    
                    const btnPopupNext = document.getElementById('btn-popup-next');
                    if(btnPopupNext) btnPopupNext.classList.remove('hidden');
                }
            } else if (popupData.type === 'speaking') {
                let passThreshold = 90;
                
                if (score >= passThreshold || attempts >= 2) {
                    state.isPassed = true;
                    if(successSynth) successSynth.triggerAttackRelease(["E5", "G5", "C6"], "8n");
                    
                    status.innerHTML = score >= passThreshold ? `Très bien ! (Score: ${Math.round(score)})` : `Exercice terminé. (Score: ${Math.round(score)})`;
                    status.className = score >= passThreshold ? 'mt-4 text-sm font-bold text-green-500 h-5' : 'mt-4 text-sm font-medium text-gray-600 h-5';
                    
                    document.getElementById('speaking-target').innerText = popupData.krTextFull;
                    
                    const btnPlay = document.getElementById('btn-popup-play');
                    if (btnPlay) btnPlay.classList.remove('hidden');

                    btnEl.disabled = true;
                    btnEl.classList.replace('bg-green-500', 'bg-gray-300');
                    btnNext.disabled = false;
                    
                    const btnPopupNext = document.getElementById('btn-popup-next');
                    if(btnPopupNext) btnPopupNext.classList.remove('hidden');
                } else {
                    // Fail 1st time
                    status.innerHTML = `Essayez encore ! (Score: ${Math.round(score)} - ${attempts}/2)`;
                    status.className = 'mt-4 text-sm font-medium text-yellow-600 h-5';
                    document.getElementById('speaking-target').innerText = popupData.krTextFull; // 1회 실패시 텍스트 공개
                    
                    const btnPlay = document.getElementById('btn-popup-play');
                    if (btnPlay) btnPlay.classList.remove('hidden'); // 오디오 버튼 노출
                }
            }
        }

        // --- Navigation ---
        btnNext.addEventListener('click', async () => {
            if(currentIndex === 0) {
                await initSynths(); 
            }
            if(transitionSynth) transitionSynth.triggerAttackRelease('E5', '0.05s');
            
            // Outro 진입 제어는 loadPage에서 자동 처리됩니다.
            currentIndex++;
            loadPage(currentIndex);
        });

        btnPrev.addEventListener('click', () => {
            if (currentIndex > 0) {
                if(transitionSynth) transitionSynth.triggerAttackRelease('C5', '0.05s');
                currentIndex--;
                loadPage(currentIndex);
            }
        });

        // Initialize first page
        loadPage(currentIndex);

    </script>
</body>
</html>

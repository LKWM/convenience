<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission débutant - Aller au convenience store</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Tone.js for Sounds -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            background-color: #FEFCE8; 
            touch-action: none;
            font-family: 'Inter', 'Noto Sans', sans-serif;
            color: #1F2937;
        }

        #app-container {
            width: 100vw; height: 100dvh; 
            padding: clamp(10px, 3vh, 2rem);
            box-sizing: border-box;
            display: flex; justify-content: center; align-items: center;
        }

        .lesson-card {
            width: 100%; max-width: 800px; height: 100%;
            background: white; border-radius: 1.5rem; border: 2px solid #FEF08A;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        #content-area {
            flex: 1 1 auto; display: flex; flex-direction: column;
            justify-content: center; align-items: center;    
            padding: clamp(1.5rem, 4vw, 3rem); gap: clamp(1.5rem, 4vh, 2.5rem);
            overflow: hidden; min-height: 0; position: relative;
        }

        .text-title { font-size: clamp(1.5rem, 5vw, 2.5rem); line-height: 1.2; font-weight: 800; }
        .text-body { font-size: clamp(1rem, 3vw, 1.25rem); line-height: 1.5; color: #374151; }
        .text-icon { font-size: clamp(3.5rem, 10vw, 5rem); }

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .animate-pop-in { animation: popIn 0.3s ease-out forwards; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }

        .recording-pulse { animation: pulse-red 1.5s infinite; background-color: #EF4444 !important; color: white !important; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .audio-wave { display: flex; align-items: center; justify-content: center; gap: 4px; height: 100%; }
        .audio-wave span { display: block; width: 4px; background-color: #22C55E; border-radius: 2px; animation: wave 1s infinite ease-in-out; }
        .audio-wave span:nth-child(2) { animation-delay: 0.2s; }
        .audio-wave span:nth-child(3) { animation-delay: 0.4s; }
        .audio-wave span:nth-child(4) { animation-delay: 0.6s; }
        @keyframes wave { 0%, 100% { height: 30%; } 50% { height: 100%; } }

        #popup-overlay { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(2px); }
        
        .control-btn {
            padding: clamp(0.5rem, 2vw, 0.75rem) clamp(1rem, 3vw, 1.5rem);
            border-radius: 0.75rem; font-weight: 700; font-size: clamp(0.875rem, 2vw, 1rem);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="lesson-view" class="lesson-card">
            <div id="content-area"></div>

            <div id="controls-area" class="w-full flex-none border-t border-gray-100 bg-white px-6 py-6 flex flex-col justify-center gap-3 z-10 relative">
                <div id="progress-container" class="hidden w-full flex-col gap-1">
                    <div class="flex justify-end w-full leading-none">
                        <span id="progress-text" class="text-[10px] text-gray-400 font-bold tracking-wider m-0 leading-none">1/11</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-1">
                        <div id="progress-bar" class="bg-green-500 h-1 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>

                <div class="flex justify-between items-center w-full">
                    <div class="flex items-center gap-2">
                        <button id="btn-prev" class="invisible control-btn bg-gray-100 text-gray-600 hover:bg-gray-200">
                            <i class="ph ph-arrow-left mr-1"></i> <span class="hidden sm:inline">Précédent</span>
                        </button>
                        <button id="btn-popup-toggle" class="invisible control-btn bg-yellow-100 text-yellow-700 hover:bg-yellow-200">
                            <i class="ph ph-chat-centered-text mr-1"></i> <span class="hidden sm:inline">Exercice</span>
                        </button>
                    </div>
                    <button id="btn-next" class="control-btn bg-green-500 text-white hover:bg-green-600 disabled:opacity-50 shadow-sm disabled:cursor-not-allowed">
                        <span id="btn-next-text">Commencer</span> <i id="btn-next-icon" class="ph ph-arrow-right ml-1"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="popup-overlay" class="absolute inset-0 z-50 hidden flex justify-center items-center p-4">
            <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-[420px] flex flex-col animate-pop-in relative border-4 border-yellow-400 p-6 md:p-8">
                <button id="btn-close-popup" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 p-1 leading-none z-10">
                    <i class="ph ph-x text-2xl"></i>
                </button>
                <div id="popup-content" class="w-full flex flex-col items-center justify-center gap-5"></div>
            </div>
        </div>
    </div>

    <script>
        const lessonData = [
            { id: 1, type: 'intro', subtitle: "Mission débutant - Aller au convenience store", title: "Leçon 1. Bonjour, au revoir !", buttonText: "Commencer" },
            { id: 2, type: 'text-audio', text: "Bonjour ! Bienvenue dans le programme « Mission débutant - Aller au convenience store ». Ce programme a été créé pour les personnes qui voyagent ou s'installent en Corée sans parler couramment coréen. Dans ces situations, on a souvent peur de parler coréen dans les cafés, les restaurants ou les magasins où il faut échanger plusieurs questions, et on finit souvent par communiquer en anglais.", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774887402/1-1_xovugt.wav" },
            { id: 3, type: 'text-audio-popup', text: "Mais il y a un endroit où vous pouvez essayer de parler coréen même si vous êtes un vrai débutant. C'est le « 편의점 ». Dans ce programme, nous allons tout faire en coréen : entrer dans le magasin, saluer, choisir les articles que l'on veut, poser des questions et même payer.<br><br>Tout d'abord, essayons de répéter ce mot.", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774887425/1-2_ivvml7.wav", popup: { type: 'repeat', krText: "편의점", frText: "Convenience store", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774887958/%E1%84%91%E1%85%A7%E1%86%AB%E1%84%8B%E1%85%B4%E1%84%8C%E1%85%A5%E1%86%B7_erub8c.wav", reference: "편의점", threshold: 80 } },
            { id: 4, type: 'text-audio', text: "Très bien ! Le « 편의점 » est un petit magasin similaire aux supérettes ou aux night shops que l'on trouve facilement en Europe ou en Amérique du Nord. Mais les « 편의점 » coréens sont ouverts 24 heures et vendent une très grande variété de nourriture et de boissons. On peut y aussi acheter de l'alcool et des cigarettes, recharger sa carte de transport, envoyer des colis, et même manger à l'intérieur du magasin !", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774887953/1-3_zczqfg.mp3" },
            { id: 5, type: 'text-audio-popup', text: "Alors, imaginez maintenant que vous entrez dans un « 편의점 ». Le caissier va vous saluer.", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774887953/1-4_piuurn.mp3", popup: { type: 'audio-only', krText: "어서 오세요.", frText: "Bienvenue.", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888007/S-2_o1flck.mp3" } },
            { id: 6, type: 'text-audio-popup', text: "Le caissier vous a salué, il faut donc y répondre. Répétez après moi.", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774887953/1-5_nlyold.mp3", popup: { type: 'repeat', krText: "안녕하세요?", frText: "Bonjour", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888032/S-3_w316i0.wav", reference: "안녕하세요", threshold: 80 } },
            { id: 7, type: 'text-audio-popup', text: "Super ! Alors maintenant, imaginez que vous avez fini de choisir vos articles et de payer. Le caissier va d'abord vous remercier.", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888329/1-6_edoyxx.mp3", popup: { type: 'audio-only', krText: "감사합니다, 안녕히 가세요!", frText: "Merci, au revoir !", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888051/S-4_a2ludm.mp3" } },
            { id: 8, type: 'text-audio-popup', text: "Ensuite, c'est à votre tour de saluer le caissier.", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888330/1-7_tbi6et.mp3", popup: { type: 'repeat', krText: "안녕히 계세요.", frText: "Au revoir", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888071/S-5_cfeudu.wav", reference: "안녕히 계세요", threshold: 80 } },
            { id: 9, type: 'text-audio-complex-popup', text: "Très bien ! Nous allons répéter les salutations que nous venons de voir. Répondez au caissier en coréen.", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888331/1-8_n4agzw.mp3", cardAudio: { krText: "어서 오세요.", frText: "Bienvenue.", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888007/S-2_o1flck.mp3" }, popup: { type: 'speaking', krTextBlank: "_____?", krTextFull: "안녕하세요?", frText: "Bonjour", reference: "안녕하세요", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888032/S-3_w316i0.wav", threshold: 90 } },
            { id: 10, type: 'text-audio-complex-popup', text: "Cette fois-ci, dites au revoir et sortez du magasin.", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888332/1-9_bhb8dx.mp3", cardAudio: { krText: "감사합니다, 안녕히 가세요.", frText: "Merci, au revoir.", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888051/S-4_a2ludm.mp3" }, popup: { type: 'speaking', krTextBlank: "___ ___.", krTextFull: "안녕히 계세요.", frText: "Au revoir", reference: "안녕히 계세요", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888071/S-5_cfeudu.wav", threshold: 90 } },
            { id: 11, type: 'outro', text: "Fantastique ! Comme c'est la toute première leçon, nous avons juste fait un petit échauffement avec des salutations simples. Dans la prochaine leçon, nous nous entraînerons à régler à la caisse de manière naturelle dans un « 편의점 » coréen ! Alors, à tout de suite !", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888333/1-10_qfsvxs.wav" }
        ];

        let currentIndex = 0;
        let currentAudio = null;
        let popupAudio = null;
        let correctSound, completionSynth, transitionSynth, successSynth, errorSynth;
        
        let pageStates = lessonData.map(() => ({ 
            isPassed: false,
            isSkipped: false,
            audioPlayed: false,
            attemptsCount: 0,
            lastStatusHtml: '',
            lastStatusClass: ''
        }));
        
        let mediaRecorder, audioChunks = [], isRecording = false;

        const BASE_44_ORIGIN = "https://coreeno.base44.app"; 
        const CLOVA_API_FUNCTION_URL = BASE_44_ORIGIN + '/api/functions/naverClovaSpeech';

        function calculateSimilarity(str1, str2) {
            const s1 = (str1 || "").replace(/[^가-힣a-zA-Z0-9]/g, '');
            const s2 = (str2 || "").replace(/[^가-힣a-zA-Z0-9]/g, '');
            if (s1.length === 0 && s2.length === 0) return 100;
            if (s1.length === 0 || s2.length === 0) return 0;
            let costs = new Array(s2.length + 1);
            for (let i = 0; i <= s1.length; i++) {
                let lastValue = i;
                for (let j = 0; j <= s2.length; j++) {
                    if (i === 0) costs[j] = j;
                    else if (j > 0) {
                        let newValue = costs[j - 1];
                        if (s1.charAt(i - 1) !== s2.charAt(j - 1))
                            newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                        costs[j - 1] = lastValue;
                        lastValue = newValue;
                    }
                }
                if (i > 0) costs[s2.length] = lastValue;
            }
            return Math.max(0, (1 - costs[s2.length] / Math.max(s1.length, s2.length)) * 100);
        }

        async function initSynths() {
            if(!correctSound) {
                await Tone.start();
                correctSound = new Tone.Synth().toDestination();
                completionSynth = new Tone.PolySynth(Tone.Synth).toDestination();
                successSynth = new Tone.PolySynth(Tone.Synth).toDestination();
                transitionSynth = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 } }).toDestination();
                errorSynth = new Tone.Synth({ oscillator: { type: 'triangle' }, envelope: { attack: 0.05, decay: 0.2, sustain: 0.2, release: 0.4 } }).toDestination();
            }
        }

        function stopAllMedia() {
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            if (popupAudio) { popupAudio.pause(); popupAudio.currentTime = 0; }
            if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); isRecording = false; }
        }

        function updateProgress() {
            const container = document.getElementById('progress-container');
            const bar = document.getElementById('progress-bar');
            const text = document.getElementById('progress-text');
            if (currentIndex === 0) container.classList.add('hidden');
            else {
                container.classList.remove('hidden'); container.classList.add('flex');
                const total = lessonData.length - 1; 
                bar.style.width = `${(currentIndex / total) * 100}%`;
                text.innerText = `${currentIndex}/${total}`;
            }
        }

        function loadPage(index) {
            stopAllMedia();
            
            document.getElementById('popup-overlay').classList.add('hidden');
            document.getElementById('btn-popup-toggle').classList.add('invisible');
            
            const nextBtn = document.getElementById('btn-next');
            const toggleBtn = document.getElementById('btn-popup-toggle');
            
            if(index === 0) document.getElementById('btn-prev').classList.add('invisible'); 
            else document.getElementById('btn-prev').classList.remove('invisible');

            const data = lessonData[index];
            updateProgress();

            const area = document.getElementById('content-area');
            
            if (data.type === 'intro') {
                area.innerHTML = `
                    <div class="text-yellow-500 animate-fade-in"><i class="ph-fill ph-storefront text-icon"></i></div>
                    <div class="flex flex-col items-center justify-center gap-2 w-full text-center">
                        <h3 class="text-[clamp(0.75rem,2vw,1rem)] text-gray-500 font-bold uppercase m-0 tracking-wide">${data.subtitle}</h3>
                        <h1 class="text-title text-green-600 animate-fade-in delay-100 m-0 leading-tight">${data.title}</h1>
                    </div>
                `;
                document.getElementById('btn-next-text').innerText = data.buttonText || "Commencer";
                nextBtn.disabled = false;
                
            } else if (data.type === 'outro') {
                document.getElementById('controls-area').classList.add('hidden');
                area.innerHTML = `
                    <div class="text-yellow-500 animate-pop-in"><i class="ph-fill ph-confetti text-icon"></i></div>
                    <div class="text-body max-w-2xl text-center animate-fade-in">${data.text}</div>
                `;
                if (completionSynth) completionSynth.triggerAttackRelease(["C5", "E5", "G5", "C6"], "4n");
                playMainAudio(data);
                
                window.parent.postMessage({ type: 'lesson_complete' }, '*');
                
            } else {
                document.getElementById('btn-next-text').innerText = "Suivant";
                document.getElementById('controls-area').classList.remove('hidden');
                
                area.innerHTML = `<div class="text-body max-w-2xl text-center animate-fade-in text-gray-800">${data.text}</div>`;
                
                if (!data.type.includes('popup')) { 
                    nextBtn.disabled = false; 
                    pageStates[index].isPassed = true; 
                } else {
                    if (pageStates[index].audioPlayed) {
                        toggleBtn.classList.remove('invisible');
                        if (pageStates[index].isPassed || pageStates[index].isSkipped || pageStates[index].attemptsCount >= 2) {
                            nextBtn.disabled = false;
                        } else {
                            nextBtn.disabled = true;
                        }
                    } else {
                        nextBtn.disabled = true;
                    }
                }
                
                playMainAudio(data);
            }
        }

        function playMainAudio(data, onEndCallback = null) {
            if(!data.audio) { 
                if (data.type.includes('popup') && !pageStates[currentIndex].audioPlayed) {
                    pageStates[currentIndex].audioPlayed = true;
                    showPopupSequence(data);
                }
                if (data.type.includes('popup')) document.getElementById('btn-popup-toggle').classList.remove('invisible');
                if (onEndCallback) onEndCallback(); 
                return; 
            }

            if (pageStates[currentIndex].audioPlayed) {
                if (data.type.includes('popup')) document.getElementById('btn-popup-toggle').classList.remove('invisible');
                if (onEndCallback) onEndCallback();
                return;
            }

            currentAudio = new Audio(data.audio);
            currentAudio.play().catch(() => {});
            currentAudio.onended = () => {
                pageStates[currentIndex].audioPlayed = true;
                if (data.type.includes('popup')) {
                    document.getElementById('btn-popup-toggle').classList.remove('invisible');
                    showPopupSequence(data);
                }
                if (onEndCallback) onEndCallback();
            };
        }

        function showPopupSequence(lessonObj) {
            const overlay = document.getElementById('popup-overlay');
            overlay.classList.remove('hidden');
            const state = pageStates[currentIndex];

            if (lessonObj.type === 'text-audio-complex-popup' && !state.isPassed && state.attemptsCount === 0 && !state.isSkipped) {
                let audioUrl = lessonObj.cardAudio.audio;
                const content = document.getElementById('popup-content');
                
                content.innerHTML = `
                    <div class="flex flex-col items-center gap-2 w-full text-center flex-none">
                        <h2 class="text-2xl md:text-3xl font-extrabold text-gray-800 m-0 break-words leading-tight w-full">${lessonObj.cardAudio.krText}</h2>
                        <p class="text-base md:text-lg text-gray-500 m-0 break-words leading-tight w-full">${lessonObj.cardAudio.frText}</p>
                    </div>
                    <div class="flex items-center justify-center gap-4 w-full h-16 flex-none mt-4">
                        <div id="popup-wave" class="audio-wave h-full w-full"><span></span><span></span><span></span><span></span></div>
                    </div>
                `;

                if(popupAudio) { popupAudio.pause(); popupAudio.currentTime = 0; }
                popupAudio = new Audio(audioUrl);
                popupAudio.play().catch(e=>console.log(e));

                popupAudio.onended = () => {
                    const wave = document.getElementById('popup-wave');
                    if(wave) wave.classList.add('hidden');
                    setTimeout(() => {
                        renderTask(lessonObj.popup, state);
                    }, 1000);
                };
            } else {
                renderTask(lessonObj.popup || lessonObj, state);
            }
        }

        function renderTask(taskData, state) {
            const isAudioOnly = taskData.type === 'audio-only';
            const isRepeat = taskData.type === 'repeat';
            const isSpeaking = taskData.type === 'speaking';
            
            const content = document.getElementById('popup-content');
            let contentHtml = '';

            const defaultStatus = 'Appuyez sur le micro pour parler';
            const statusHtml = state.attemptsCount > 0 ? state.lastStatusHtml : (state.isPassed ? 'Très bien ! Passez à la suite.' : defaultStatus);
            const statusClass = state.attemptsCount > 0 ? state.lastStatusClass : (state.isPassed ? 'text-green-500' : 'text-gray-500');

            // 마이크 버튼 비활성화 조건 (2회 시도 제한)
            let isRecordDisabled = state.isPassed || state.attemptsCount >= 2;

            // Continuer 버튼 설정
            let nextBtnDisabledAttr = (isSpeaking && !state.isPassed && state.attemptsCount < 2) ? 'disabled' : '';
            let nextBtnOpacityClass = (isSpeaking && !state.isPassed && state.attemptsCount < 2) ? 'opacity-50 cursor-not-allowed' : '';

            // 알림: 버튼 중복 오류 수정을 위해 여기서 <button id="btn-close-popup"> 태그를 모두 제거했습니다.
            // 닫기 버튼은 이미 최상단 <div id="popup-overlay"> 바로 안쪽에 존재합니다.
            
            if (isAudioOnly) {
                contentHtml = `
                    <div class="text-yellow-500 m-0"><i class="ph-fill ph-speaker-high text-6xl"></i></div>
                    <div class="flex flex-col items-center gap-2 w-full text-center">
                        <h2 class="text-2xl font-extrabold text-gray-800 m-0">${taskData.krText}</h2>
                        ${taskData.frText ? `<p class="text-base text-gray-500 m-0">${taskData.frText}</p>` : ''}
                    </div>
                    <button id="btn-popup-play" class="px-6 py-3 bg-green-500 text-white rounded-full font-bold shadow-md hover:bg-green-600 w-full max-w-[200px] flex items-center justify-center mt-2"><i class="ph-fill ph-play mr-2 text-xl"></i> Écouter</button>
                    <button id="btn-popup-next" class="px-6 py-3 bg-blue-500 text-white rounded-full font-bold shadow-md hover:bg-blue-600 w-full max-w-[200px] flex items-center justify-center transition-opacity duration-300">Continuer <i class="ph ph-arrow-right ml-2"></i></button>
                `;
            } else if (isRepeat) {
                // Card with repeat: Continuer 항상 활성화, 마이크는 2회 시도 후 비활성
                contentHtml = `
                    <div class="flex flex-col items-center gap-2 w-full text-center">
                        <h2 class="text-2xl md:text-3xl font-extrabold text-gray-800 m-0">${taskData.krText}</h2>
                        <p class="text-base text-gray-500 m-0">${taskData.frText}</p>
                    </div>
                    <div class="flex items-center justify-center gap-5 w-full h-16">
                        <button id="btn-popup-play" class="w-14 h-14 rounded-full flex items-center justify-center bg-yellow-400 text-yellow-900 shadow-md hover:bg-yellow-500 transition-colors"><i class="ph-fill ph-play text-2xl"></i></button>
                        <button id="btn-popup-record" class="w-16 h-16 ${isRecordDisabled ? 'bg-gray-300 pointer-events-none' : 'bg-green-500 hover:bg-green-600'} text-white rounded-full flex items-center justify-center shadow-lg transition-all" ${isRecordDisabled ? 'disabled' : ''}><i class="ph-fill ph-microphone text-3xl"></i></button>
                    </div>
                    <div class="flex items-center justify-center min-h-[3rem] w-full">
                        <p id="popup-status" class="text-sm font-bold ${statusClass} text-center w-full m-0">${statusHtml}</p>
                    </div>
                    <button id="btn-popup-next" class="px-6 py-3 bg-blue-500 text-white rounded-full font-bold shadow-md hover:bg-blue-600 w-full max-w-[200px] flex items-center justify-center transition-opacity duration-300">Continuer <i class="ph ph-arrow-right ml-2"></i></button>
                `;
            } else if (isSpeaking) {
                let targetText = (state.attemptsCount > 0 || state.isPassed) ? taskData.krTextFull : taskData.krTextBlank;
                let playBtnClass = (state.attemptsCount > 0 || state.isPassed) ? 'bg-yellow-400 text-yellow-900 hover:bg-yellow-500 shadow-md' : 'hidden';

                contentHtml = `
                    <div class="flex flex-col items-center gap-2 w-full text-center">
                        <h2 id="task-target" class="text-2xl md:text-3xl font-extrabold text-gray-800 m-0">${targetText}</h2>
                        <p class="text-base text-gray-500 m-0">${taskData.frText}</p>
                    </div>
                    <div class="flex items-center justify-center gap-5 w-full h-16">
                        <button id="btn-popup-play" class="w-14 h-14 rounded-full flex items-center justify-center transition-colors ${playBtnClass}"><i class="ph-fill ph-play text-2xl"></i></button>
                        <button id="btn-popup-record" class="w-16 h-16 ${isRecordDisabled ? 'bg-gray-300 pointer-events-none' : 'bg-green-500 hover:bg-green-600'} text-white rounded-full flex items-center justify-center shadow-lg transition-all" ${isRecordDisabled ? 'disabled' : ''}><i class="ph-fill ph-microphone text-3xl"></i></button>
                    </div>
                    <div class="flex items-center justify-center min-h-[3rem] w-full">
                        <p id="popup-status" class="text-sm font-bold ${statusClass} text-center w-full m-0">${statusHtml}</p>
                    </div>
                    <button id="btn-popup-next" class="px-6 py-3 bg-blue-500 text-white rounded-full font-bold shadow-md hover:bg-blue-600 w-full max-w-[200px] flex items-center justify-center transition-opacity duration-300 ${nextBtnOpacityClass}" ${nextBtnDisabledAttr}>Continuer <i class="ph ph-arrow-right ml-2"></i></button>
                `;
            }

            content.innerHTML = contentHtml;
            const bPlay = document.getElementById('btn-popup-play');
            const bRecord = document.getElementById('btn-popup-record');
            const bNextPop = document.getElementById('btn-popup-next');
            const bClose = document.getElementById('btn-close-popup');

            if(bNextPop) bNextPop.onclick = () => { 
                document.getElementById('popup-overlay').classList.add('hidden'); 
                const nextBtn = document.getElementById('btn-next');
                nextBtn.disabled = false;
                
                // Continuer를 누를 때, 완료 상태(2회 소진 또는 통과)가 아니면 스킵 처리
                if (!state.isPassed && state.attemptsCount < 2) {
                    state.isSkipped = true;
                }
                nextBtn.click(); 
            };
            
            if(bClose) bClose.onclick = () => {
                document.getElementById('popup-overlay').classList.add('hidden');
                document.getElementById('btn-popup-toggle').classList.remove('invisible');
                if (state.isPassed || state.isSkipped || state.attemptsCount >= 2) {
                    document.getElementById('btn-next').disabled = false;
                } else {
                    document.getElementById('btn-next').disabled = true;
                }
            };
            
            if(bPlay) {
                bPlay.onclick = () => {
                    if (isRecording) return;
                    if(bRecord && !isRecordDisabled) { 
                        bRecord.disabled = true; bRecord.classList.add('opacity-50', 'pointer-events-none'); 
                    }
                    if(popupAudio) { popupAudio.pause(); popupAudio.currentTime = 0; }
                    popupAudio = new Audio(taskData.audio); popupAudio.play();
                    const orig = bPlay.innerHTML; 
                    bPlay.innerHTML = isAudioOnly ? `<div class="audio-wave"><span></span><span></span><span></span><span></span></div>` : `<i class="ph-fill ph-speaker-high"></i>`;
                    
                    popupAudio.onended = () => {
                        bPlay.innerHTML = orig; 
                        if(bRecord && !isRecordDisabled) { 
                            bRecord.disabled = false; bRecord.classList.remove('opacity-50', 'pointer-events-none'); 
                        }
                        if (isAudioOnly) {
                            state.isPassed = true; 
                            document.getElementById('btn-next').disabled = false;
                            const st = document.getElementById('popup-status'); 
                            if(st) { 
                                st.innerHTML = `Très bien ! Passez à la suite.`; 
                                st.className = 'text-sm md:text-base font-bold text-green-500 text-center w-full m-0'; 
                                state.lastStatusHtml = st.innerHTML; 
                                state.lastStatusClass = st.className;
                            }
                        }
                    };
                };
                // AudioOnly 이거나 Repeat 일 때 자동 재생 (단 1회도 시도 안한 최초 오픈 시에만)
                if (!state.isPassed && state.attemptsCount === 0 && !isSpeaking) setTimeout(() => bPlay.click(), 300);
            }
            if(bRecord) bRecord.onclick = () => toggleRecording(taskData, bRecord);
        }

        async function toggleRecording(taskData, btnEl) {
            if (btnEl.disabled || btnEl.classList.contains('pointer-events-none')) return;
            if (isRecording) { stopRecording(); btnEl.innerHTML = `<i class="ph-fill ph-spinner-gap animate-spin text-3xl"></i>`; return; }
            if (popupAudio) { popupAudio.pause(); popupAudio.currentTime = 0; }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' }); 
                    stream.getTracks().forEach(track => track.stop());
                    processAudio(blob, taskData, btnEl);
                };
                mediaRecorder.start(); isRecording = true;
                btnEl.classList.add('recording-pulse'); btnEl.innerHTML = `<i class="ph-fill ph-stop text-3xl"></i>`;
                const st = document.getElementById('popup-status');
                if(st) { st.innerHTML = `<div class="audio-wave h-full mt-1"><span></span><span></span><span></span><span></span></div>`; st.className = 'text-red-500 w-full text-center m-0'; }
            } catch (err) { alert("L'accès au microphone est requis."); }
        }

        function stopRecording() { if(mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); isRecording = false; } }

        async function processAudio(blob, taskData, btnEl) {
            const reader = new FileReader(); reader.readAsDataURL(blob);
            reader.onloadend = async () => {
                const base64 = reader.result.split(',')[1];
                const refs = taskData.reference.split('|');
                let bestScore = 0;
                let apiSuccess = false;

                for(const r of refs) {
                    try {
                        const res = await fetch(CLOVA_API_FUNCTION_URL, { 
                            method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify({ audioBase64: base64, languageCode: "Kor", referenceText: r, assessment: false }) 
                        });
                        if (res.ok) { 
                            apiSuccess = true;
                            const json = await res.json(); 
                            const recognizedText = json.text || json.recognized || "";
                            const sim = calculateSimilarity(recognizedText, r);
                            if(sim > bestScore) bestScore = sim;
                        }
                    } catch (e) { console.error(e); }
                }
                
                const status = document.getElementById('popup-status');
                if (!apiSuccess) {
                    if (status) {
                        status.innerHTML = "Erreur de connexion. Veuillez réessayer.";
                        status.className = 'text-sm md:text-base font-bold text-center w-full transition-colors text-red-500 m-0';
                    }
                    btnEl.innerHTML = `<i class="ph-fill ph-microphone text-3xl"></i>`;
                    btnEl.classList.remove('recording-pulse');
                    btnEl.disabled = false; 
                    return; 
                }

                evaluate(bestScore, taskData, btnEl, status);
            };
        }

        function evaluate(score, taskData, btnEl, status) {
            const state = pageStates[currentIndex];
            state.attemptsCount++;
            const att = state.attemptsCount;
            const threshold = taskData.threshold || 80;
            const isRepeat = taskData.type === 'repeat';
            const isSpeaking = taskData.type === 'speaking';
            
            btnEl.innerHTML = `<i class="ph-fill ph-microphone text-3xl"></i>`;
            btnEl.classList.remove('recording-pulse');
            const scoreStr = `<br><span class="text-xs text-gray-400 font-normal mt-1 block">(Score: ${Math.round(score)})</span>`;
            const baseClasses = 'text-sm md:text-base font-bold text-center w-full transition-colors m-0 leading-tight ';

            if (isRepeat) {
                // Card with repeat 피드백 로직 (정답 여부 무관 2회 강제 피드백, 스킵은 유저가 Continuer 버튼으로 언제든 가능)
                if (att === 1) {
                    status.innerHTML = (score >= threshold ? "Très bien, essayons encore une fois." : "On y est presque ! Essayons encore une fois.") + scoreStr;
                    status.className = baseClasses + (score >= threshold ? 'text-green-500' : 'text-yellow-600');
                    const bPlay = document.getElementById('btn-popup-play');
                    if (bPlay) setTimeout(() => bPlay.click(), 800);
                } else {
                    state.isPassed = true;
                    if (score >= threshold) {
                        status.innerHTML = `Très bien ! Passez à la suite.` + scoreStr;
                        status.className = baseClasses + 'text-green-500';
                        if(successSynth) successSynth.triggerAttackRelease(["E5", "G5", "C6"], "8n");
                    } else {
                        status.innerHTML = `Bien essayé ! Passez à la suite.` + scoreStr;
                        status.className = baseClasses + 'text-gray-500';
                        if(errorSynth) errorSynth.triggerAttackRelease("D3", "0.2s");
                    }
                    finishPopupTask(btnEl);
                }
            } else if (isSpeaking) {
                // Card with speaking 피드백 로직
                if (score >= threshold) {
                    state.isPassed = true;
                    status.innerHTML = `Très bien ! Passez à la suite.` + scoreStr;
                    status.className = baseClasses + 'text-green-500';
                    const targetEl = document.getElementById('task-target');
                    if(targetEl) targetEl.innerText = taskData.krTextFull;
                    if(successSynth) successSynth.triggerAttackRelease(["E5", "G5", "C6"], "8n");
                    finishPopupTask(btnEl);
                } else if (att < 2) {
                    status.innerHTML = "On y est presque ! Essayons encore une fois." + scoreStr;
                    status.className = baseClasses + 'text-yellow-600';
                    if(errorSynth) errorSynth.triggerAttackRelease("D3", "0.2s");

                    // 1회 실패: 정답 텍스트 노출 및 오디오 버튼 활성화
                    const targetEl = document.getElementById('task-target');
                    if(targetEl) targetEl.innerText = taskData.krTextFull;
                    
                    const btnPlay = document.getElementById('btn-popup-play');
                    if (btnPlay) {
                        btnPlay.className = "w-14 h-14 rounded-full flex items-center justify-center transition-colors bg-yellow-400 text-yellow-900 hover:bg-yellow-500 shadow-md";
                        setTimeout(() => btnPlay.click(), 800);
                    }
                } else {
                    state.isPassed = true;
                    status.innerHTML = `Bien essayé ! Passez à la suite.` + scoreStr;
                    status.className = baseClasses + 'text-gray-500';
                    const targetEl = document.getElementById('task-target');
                    if(targetEl) targetEl.innerText = taskData.krTextFull;
                    if(errorSynth) errorSynth.triggerAttackRelease("D3", "0.2s");
                    finishPopupTask(btnEl);
                }
            }
            
            state.lastStatusHtml = status.innerHTML;
            state.lastStatusClass = status.className;
        }

        function finishPopupTask(btnEl) {
            btnEl.disabled = true; 
            btnEl.classList.replace('bg-green-500', 'bg-gray-300'); 
            btnEl.classList.add('pointer-events-none'); 
            
            const bNextPop = document.getElementById('btn-popup-next');
            if(bNextPop) { 
                bNextPop.disabled = false; 
                bNextPop.classList.remove('opacity-50', 'cursor-not-allowed'); 
            }
        }

        window.addEventListener('beforeunload', stopAllMedia);
        document.getElementById('btn-next').addEventListener('click', async () => { 
            if(currentIndex === 0) await initSynths(); 
            if(transitionSynth) transitionSynth.triggerAttackRelease('E5', '0.05s'); 
            currentIndex++; 
            loadPage(currentIndex); 
        });
        document.getElementById('btn-prev').addEventListener('click', () => { 
            if (currentIndex > 0) { 
                if(transitionSynth) transitionSynth.triggerAttackRelease('C5', '0.05s'); 
                currentIndex--; 
                loadPage(currentIndex); 
            } 
        });
        document.getElementById('btn-popup-toggle').onclick = () => { 
            const d = lessonData[currentIndex]; 
            if(d.popup) showPopupSequence(d);
        };
        
        loadPage(0);
    </script>
</body>

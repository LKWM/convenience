<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission débutant - Aller au convenience store</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Tone.js for Sounds -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        /* 1. Reset & Layout Fundamentals */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; /* 스크롤 절대 금지 */
            background-color: #FEFCE8; 
            touch-action: none;
            font-family: 'Inter', 'Noto Sans', sans-serif;
            color: #1F2937;
        }

        /* 2. Responsive Application Container */
        #app-container {
            width: 100vw;
            height: 100dvh; /* 모바일 브라우저 UI 대응 */
            padding: clamp(10px, 3vh, 2rem);
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3. The Main Card */
        .lesson-card {
            width: 100%;
            max-width: 800px;
            height: 100%;
            background: white;
            border-radius: 1.5rem;
            border: 2px solid #FEF08A;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 4. Perfect Vertical Centering Mechanics for Content */
        #content-area {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: clamp(1.5rem, 4vw, 3rem); /* 모든 방향 동일한 여백 보장 */
            gap: clamp(1.5rem, 4vh, 2.5rem);
            overflow: hidden;
            min-height: 0;
        }

        /* 5. Fluid Typography & Icons */
        .text-title { font-size: clamp(1.5rem, 5vw, 2.5rem); line-height: 1.2; font-weight: 800; }
        .text-body { font-size: clamp(1rem, 3vw, 1.25rem); line-height: 1.5; color: #374151; }
        .text-icon { font-size: clamp(3.5rem, 10vw, 5rem); }
        .text-card-lg { font-size: clamp(1.5rem, 6vw, 2.5rem); font-weight: 800; }

        /* 6. Animations & Utilities */
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .animate-pop-in { animation: popIn 0.3s ease-out forwards; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }

        .recording-pulse { animation: pulse-red 1.5s infinite; background-color: #EF4444 !important; color: white !important; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .audio-wave { display: flex; align-items: center; justify-content: center; gap: 4px; height: 100%; }
        .audio-wave span { display: block; width: 4px; background-color: #22C55E; border-radius: 2px; animation: wave 1s infinite ease-in-out; }
        .audio-wave span:nth-child(2) { animation-delay: 0.2s; }
        .audio-wave span:nth-child(3) { animation-delay: 0.4s; }
        .audio-wave span:nth-child(4) { animation-delay: 0.6s; }
        @keyframes wave { 0%, 100% { height: 30%; } 50% { height: 100%; } }

        #popup-overlay { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(2px); }
        
        .control-btn {
            padding: clamp(0.5rem, 2vw, 0.75rem) clamp(1rem, 3vw, 1.5rem);
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: clamp(0.875rem, 2vw, 1rem);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Main Lesson Content Area -->
        <div id="lesson-view" class="lesson-card">

            <!-- Content Area (Flex-1) -->
            <div id="content-area">
                <!-- Dynamically injected content -->
            </div>

            <!-- Bottom Control Area: Symmetrical vertical padding -->
            <div id="controls-area" class="w-full flex-none border-t border-gray-100 bg-white px-6 py-6 flex flex-col justify-center gap-3">
                <div id="progress-container" class="hidden w-full flex-col gap-1">
                    <div class="flex justify-end w-full leading-none">
                        <span id="progress-text" class="text-[10px] text-gray-400 font-bold tracking-wider m-0 leading-none">1/10</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-1">
                        <div id="progress-bar" class="bg-green-500 h-1 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Control Buttons -->
                <div class="flex justify-between items-center w-full">
                    <div class="flex items-center gap-2">
                        <button id="btn-prev" class="invisible control-btn bg-gray-100 text-gray-600 hover:bg-gray-200">
                            <i class="ph ph-arrow-left mr-1"></i> <span class="hidden sm:inline">Précédent</span>
                        </button>
                        <button id="btn-popup-toggle" class="invisible control-btn bg-yellow-100 text-yellow-700 hover:bg-yellow-200">
                            <i class="ph ph-chat-centered-text mr-1"></i> <span class="hidden sm:inline">Exercice</span>
                        </button>
                    </div>
                    
                    <button id="btn-next" class="control-btn bg-green-500 text-white hover:bg-green-600 disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
                        <span id="btn-next-text">Commencer</span> <i id="btn-next-icon" class="ph ph-arrow-right ml-1"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Popup Overlay -->
        <div id="popup-overlay" class="absolute inset-0 z-50 hidden flex justify-center items-center p-4">
            <!-- p-[clamp] removed in favor of standard responsive padding. Rounded corners softened. -->
            <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-[420px] flex flex-col animate-pop-in relative border-4 border-yellow-400 p-6 md:p-8">
                <!-- Close Button -->
                <button id="btn-close-popup" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 p-1 leading-none z-10">
                    <i class="ph ph-x text-2xl"></i>
                </button>
                
                <!-- Popup Content: gap-5 provides tight, consistent spacing without being overly huge -->
                <div id="popup-content" class="w-full flex flex-col items-center justify-center gap-5">
                    <!-- Flattened layout injected here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Lesson Data ---
        const lessonData = [
            {
                id: 1, type: 'intro',
                subtitle: "Mission débutant - Aller au convenience store",
                title: "Leçon 1. Bonjour, au revoir !",
                buttonText: "Commencer"
            },
            {
                id: 2, type: 'text-audio',
                text: "Bonjour ! Bienvenue dans le programme « Mission débutant - Aller au convenience store ». Ce programme a été créé pour les personnes qui voyagent ou s'installent en Corée sans parler couramment coréen. Dans ces situations, on a souvent peur de parler coréen dans les cafés, les restaurants ou les magasins où il faut échanger plusieurs questions, et on finit souvent par communiquer en anglais.",
                audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774887402/1-1_xovugt.wav"
            },
            {
                id: 3, type: 'text-audio-popup',
                text: "Mais il y a un endroit où vous pouvez essayer de parler coréen même si vous êtes un vrai débutant. C'est le « 편의점 ». Dans ce programme, nous allons tout faire en coréen : entrer dans le magasin, saluer, choisir les articles que l'on veut, poser des questions et même payer.<br><br>Tout d'abord, essayons de répéter ce mot.",
                audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774887425/1-2_ivvml7.wav",
                popup: {
                    type: 'repeat',
                    krText: "편의점",
                    frText: "Convenience store",
                    audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774887958/%E1%84%91%E1%85%A7%E1%86%AB%E1%84%8B%E1%85%B4%E1%84%8C%E1%85%A5%E1%86%B7_erub8c.wav",
                    reference: "편의점",
                    threshold: 80
                }
            },
            {
                id: 4, type: 'text-audio',
                text: "Très bien ! Le « 편의점 » est un petit magasin similaire aux supérettes ou aux night shops que l'on trouve facilement en Europe ou en Amérique du Nord. Mais les « 편의점 » coréens sont ouverts 24 heures et vendent une très grande variété de nourriture et de boissons. On peut y aussi acheter de l'alcool et des cigarettes, recharger sa carte de transport, envoyer des colis, et même manger à l'intérieur du magasin !",
                audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774887953/1-3_zczqfg.mp3"
            },
            {
                id: 5, type: 'text-audio-popup',
                text: "Alors, imaginez maintenant que vous entrez dans un « 편의점 ». Le caissier va vous saluer.",
                audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774887953/1-4_piuurn.mp3",
                popup: {
                    type: 'audio-only',
                    krText: "어서 오세요.",
                    frText: "Bienvenue.",
                    audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888007/S-2_o1flck.mp3"
                }
            },
            {
                id: 6, type: 'text-audio-popup',
                text: "Le caissier vous a salué, il faut donc y répondre. Répétez après moi.",
                audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774887953/1-5_nlyold.mp3",
                popup: {
                    type: 'repeat',
                    krText: "안녕하세요?",
                    frText: "Bonjour",
                    audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888032/S-3_w316i0.wav",
                    reference: "안녕하세요",
                    threshold: 80
                }
            },
            {
                id: 7, type: 'text-audio-popup',
                text: "Super ! Alors maintenant, imaginez que vous avez fini de choisir vos articles et de payer. Le caissier va d'abord vous remercier.",
                audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888329/1-6_edoyxx.mp3",
                popup: {
                    type: 'audio-only',
                    krText: "감사합니다, 안녕히 가세요!",
                    frText: "Merci, au revoir !",
                    audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888051/S-4_a2ludm.mp3"
                }
            },
            {
                id: 8, type: 'text-audio-popup',
                text: "Ensuite, c'est à votre tour de saluer le caissier.",
                audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888330/1-7_tbi6et.mp3",
                popup: {
                    type: 'repeat',
                    krText: "안녕히 계세요.",
                    frText: "Au revoir",
                    audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888071/S-5_cfeudu.wav",
                    reference: "안녕히 계세요",
                    threshold: 80
                }
            },
            {
                id: 9, type: 'text-audio-complex-popup',
                text: "Très bien ! Nous allons répéter les salutations que nous venons de voir. Répondez au caissier en coréen.",
                audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888331/1-8_n4agzw.mp3",
                cardAudio: {
                    krText: "어서 오세요.",
                    frText: "Bienvenue.",
                    audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888007/S-2_o1flck.mp3" 
                },
                popup: {
                    type: 'speaking',
                    krTextBlank: "_____?",
                    krTextFull: "안녕하세요?",
                    frText: "Bonjour",
                    reference: "안녕하세요",
                    audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888032/S-3_w316i0.wav",
                    threshold: 90
                }
            },
            {
                id: 10, type: 'text-audio-complex-popup',
                text: "Cette fois-ci, dites au revoir et sortez du magasin.",
                audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888332/1-9_bhb8dx.mp3",
                cardAudio: {
                    krText: "감사합니다, 안녕히 가세요.",
                    frText: "Merci, au revoir.",
                    audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888051/S-4_a2ludm.mp3"
                },
                popup: {
                    type: 'speaking',
                    krTextBlank: "___ ___.",
                    krTextFull: "안녕히 계세요.",
                    frText: "Au revoir",
                    reference: "안녕히 계세요",
                    audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888071/S-5_cfeudu.wav",
                    threshold: 100
                }
            },
            {
                id: 11, type: 'outro',
                text: "Fantastique ! Comme c'est la toute première leçon, nous avons juste fait un petit échauffement avec des salutations simples. Dans la prochaine leçon, nous nous entraînerons à régler à la caisse de manière naturelle dans un « 편의점 » coréen ! Alors, à tout de suite !",
                audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888333/1-10_qfsvxs.wav"
            }
        ];

        // --- App State ---
        let currentIndex = 0;
        let currentAudio = null;
        let popupAudio = null;
        
        let correctSound, completionSynth, transitionSynth, successSynth, errorSynth;
        
        let pageStates = lessonData.map(() => ({
            isPassed: false,
            attemptsCount: 0
        }));
        
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        const BASE_44_ORIGIN = "https://coreeno.base44.app"; 
        const CLOVA_API_FUNCTION_URL = BASE_44_ORIGIN + '/api/functions/naverClovaSpeech';

        // --- DOM Elements ---
        const contentArea = document.getElementById('content-area');
        const progressContainer = document.getElementById('progress-container');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');
        const btnNext = document.getElementById('btn-next');
        const btnNextText = document.getElementById('btn-next-text');
        const btnNextIcon = document.getElementById('btn-next-icon');
        const btnPrev = document.getElementById('btn-prev');
        const btnPopupToggle = document.getElementById('btn-popup-toggle');
        const popupOverlay = document.getElementById('popup-overlay');
        const popupContent = document.getElementById('popup-content');
        const btnClosePopup = document.getElementById('btn-close-popup');
        const controlsArea = document.getElementById('controls-area');

        // --- Init Audio Context ---
        async function initSynths() {
            if(!correctSound) {
                await Tone.start();
                correctSound = new Tone.Synth().toDestination();
                completionSynth = new Tone.PolySynth(Tone.Synth).toDestination();
                successSynth = new Tone.PolySynth(Tone.Synth).toDestination();
                transitionSynth = new Tone.Synth({
                    oscillator: { type: 'sine' },
                    envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 }
                }).toDestination();
                transitionSynth.volume.value = -10;

                errorSynth = new Tone.Synth({
                    oscillator: { type: 'triangle' },
                    envelope: { attack: 0.05, decay: 0.2, sustain: 0.2, release: 0.4 }
                }).toDestination();
                errorSynth.volume.value = -10;
            }
        }

        // --- Core Rendering ---
        function updateProgress() {
            if (currentIndex === 0) {
                progressContainer.classList.add('hidden');
                progressContainer.classList.remove('flex');
            } else {
                progressContainer.classList.remove('hidden');
                progressContainer.classList.add('flex');
                const totalSteps = lessonData.length - 1; 
                const pct = (currentIndex / totalSteps) * 100;
                progressBar.style.width = `${pct}%`;
                progressText.innerText = `${currentIndex}/${totalSteps}`;
            }
        }

        function stopCurrentAudios() {
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            if (popupAudio) { popupAudio.pause(); popupAudio.currentTime = 0; }
        }

        function loadPage(index) {
            stopCurrentAudios();
            popupOverlay.classList.add('hidden');
            btnPopupToggle.classList.add('invisible');
            
            btnNext.disabled = !pageStates[index].isPassed; 
            
            if(index === 0) btnPrev.classList.add('invisible');
            else btnPrev.classList.remove('invisible');

            const data = lessonData[index];
            updateProgress();

            if (data.type === 'intro') {
                contentArea.innerHTML = `
                    <div class="text-yellow-500 animate-fade-in"><i class="ph-fill ph-storefront text-icon"></i></div>
                    <div class="flex flex-col items-center justify-center gap-2 w-full text-center">
                        <h3 class="text-[clamp(0.75rem,2vw,1rem)] text-gray-500 font-bold tracking-wide animate-fade-in uppercase m-0">${data.subtitle}</h3>
                        <h1 class="text-title text-green-600 animate-fade-in delay-100 m-0 leading-tight">${data.title}</h1>
                    </div>
                `;
                btnNextText.innerText = data.buttonText;
                btnNextIcon.className = "ph ph-arrow-right ml-1";
                btnNext.disabled = false;
                controlsArea.classList.remove('hidden');
            } 
            else if (data.type === 'outro') {
                controlsArea.classList.add('hidden');
                contentArea.innerHTML = `
                    <div class="text-yellow-500 animate-pop-in"><i class="ph-fill ph-confetti text-icon"></i></div>
                    <div class="text-body max-w-2xl text-center animate-fade-in">
                        ${data.text}
                    </div>
                `;
                if (completionSynth) completionSynth.triggerAttackRelease(["C5", "E5", "G5", "C6"], "4n");
                window.parent.postMessage({ type: 'lesson_complete' }, '*');
                playMainAudio(data);
                return;
            }
            else {
                btnNextText.innerText = "Suivant";
                btnNextIcon.className = "ph ph-arrow-right ml-1";
                controlsArea.classList.remove('hidden');

                contentArea.innerHTML = `
                    <div class="text-body max-w-2xl text-center animate-fade-in text-gray-800">
                        ${data.text}
                    </div>
                `;

                if (!data.type.includes('popup')) {
                    btnNext.disabled = false;
                    pageStates[index].isPassed = true;
                } else if (pageStates[index].isPassed) {
                    btnPopupToggle.classList.remove('invisible');
                }

                playMainAudio(data);
            }
        }

        function playMainAudio(data, onEndCallback = null) {
            if(!data.audio) return;
            
            currentAudio = new Audio(data.audio);
            currentAudio.play().catch(e => console.log("Auto-play blocked"));
            
            currentAudio.onended = () => {
                if (data.type.includes('popup')) {
                    if (!pageStates[currentIndex].isPassed) {
                        showPopupSequence(data);
                    }
                    btnPopupToggle.classList.remove('invisible');
                }
                if(onEndCallback) onEndCallback();
            };
        }

        // --- Componentized Popup Renderers ---
        function showPopupSequence(lessonObj) {
            popupOverlay.classList.remove('hidden');
            const state = pageStates[currentIndex];
            
            // Complex Popup Stage 1 (Listening Phase)
            if (lessonObj.type === 'text-audio-complex-popup' && !state.isPassed) {
                let audioUrl = lessonObj.cardAudio.audio;
                
                popupContent.innerHTML = `
                    <div class="flex flex-col items-center gap-2 w-full text-center flex-none">
                        <h2 class="text-2xl md:text-3xl font-extrabold text-gray-800 m-0 break-words leading-tight w-full">${lessonObj.cardAudio.krText}</h2>
                        <p class="text-base md:text-lg text-gray-500 m-0 break-words leading-tight w-full">${lessonObj.cardAudio.frText}</p>
                    </div>
                    
                    <div class="flex items-center justify-center gap-4 w-full h-16 flex-none">
                        <div id="popup-wave" class="audio-wave h-full w-full"><span></span><span></span><span></span><span></span></div>
                    </div>
                    
                    <div class="flex items-center justify-center min-h-[3rem] w-full flex-none invisible">
                        <p class="m-0"></p>
                    </div>
                    
                    <button class="px-6 py-3 bg-blue-500 text-white rounded-full font-bold shadow-md w-full max-w-[200px] flex-none invisible flex items-center justify-center">
                        Continuer
                    </button>
                `;
                
                if(popupAudio) { popupAudio.pause(); popupAudio.currentTime = 0; }
                popupAudio = new Audio(audioUrl);
                popupAudio.play().catch(e=>console.log(e));
                
                popupAudio.onended = () => {
                    document.getElementById('popup-wave').classList.add('hidden');
                    setTimeout(() => {
                        renderTask(lessonObj.popup, state);
                    }, 2000);
                };
            } else {
                renderTask(lessonObj.popup || lessonObj, state);
            }
        }

        function renderTask(taskData, state) {
            let isAudioOnly = taskData.type === 'audio-only';
            let isSpeaking = taskData.type === 'speaking';
            let isRepeat = taskData.type === 'repeat';
            
            let contentHtml = '';

            // [Audio-Only Card]
            if (isAudioOnly) {
                contentHtml = `
                    <div class="text-yellow-500 m-0 leading-none flex-none">
                        <i class="ph-fill ph-speaker-high text-5xl md:text-6xl"></i>
                    </div>
                    
                    <div class="flex flex-col items-center gap-2 w-full text-center flex-none">
                        <h2 class="text-2xl md:text-3xl font-extrabold text-gray-800 m-0 break-words leading-tight w-full">${taskData.krText}</h2>
                        <p class="text-base md:text-lg text-gray-500 m-0 break-words leading-tight w-full">${taskData.frText}</p>
                    </div>
                    
                    <button id="btn-popup-play" class="px-6 py-3 bg-green-500 text-white rounded-full font-bold shadow-md hover:bg-green-600 w-full max-w-[200px] flex items-center justify-center flex-none">
                        <i class="ph-fill ph-play mr-2 text-xl"></i> Écouter
                    </button>
                    
                    <button id="btn-popup-next" class="px-6 py-3 bg-blue-500 text-white rounded-full font-bold shadow-md hover:bg-blue-600 w-full max-w-[200px] flex items-center justify-center flex-none transition-opacity duration-300 ${state.isPassed ? '' : 'opacity-50 cursor-not-allowed'}" ${state.isPassed ? '' : 'disabled'}>
                        Continuer <i class="ph ph-arrow-right ml-2"></i>
                    </button>
                `;
            } 
            // [Speaking / Repeat Card]
            else {
                let showFullText = state.isPassed || (isSpeaking && state.attemptsCount >= 2) || !isSpeaking; 
                let targetText = showFullText ? (taskData.krTextFull || taskData.krText) : taskData.krTextBlank;
                let subText = taskData.frText;

                let initialStatus = state.isPassed ? 'Très bien ! Passez à la suite.' :
                                    (isSpeaking ? 'Appuyez pour répondre' : 'Appuyez sur le micro pour parler');
                let initialStatusColor = state.isPassed ? 'text-green-500' : 'text-gray-500';

                // 스피킹 과제이면서 아직 통과 전, 시도 횟수 0회일 때는 오디오 버튼이 보이지만 비활성화됨
                let isPlayDisabled = isSpeaking && !state.isPassed && state.attemptsCount === 0;
                let playBtnDisabledStr = isPlayDisabled ? 'disabled' : '';
                let playBtnColorClass = isPlayDisabled ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-yellow-400 text-yellow-900 hover:bg-yellow-500 shadow-md';
                let playBtnVisibility = taskData.audio ? '' : 'hidden';

                contentHtml = `
                    <div class="flex flex-col items-center gap-2 w-full text-center flex-none">
                        <h2 id="task-target" class="text-2xl md:text-3xl font-extrabold text-gray-800 m-0 break-words leading-tight w-full">${targetText}</h2>
                        <p class="text-base md:text-lg text-gray-500 m-0 break-words leading-tight w-full">${subText}</p>
                    </div>
                    
                    <div class="flex items-center justify-center gap-5 w-full h-16 flex-none">
                        <button id="btn-popup-play" class="w-14 h-14 rounded-full flex items-center justify-center transition-colors ${playBtnColorClass} ${playBtnVisibility}" ${playBtnDisabledStr}>
                            <i class="ph-fill ph-play text-2xl"></i>
                        </button>
                        <button id="btn-popup-record" class="w-16 h-16 ${state.isPassed ? 'bg-gray-300' : 'bg-green-500 hover:bg-green-600 hover:scale-105'} text-white rounded-full flex items-center justify-center shadow-lg transition-all transform" ${state.isPassed ? 'disabled' : ''}>
                            <i class="ph-fill ph-microphone text-3xl"></i>
                        </button>
                    </div>
                    
                    <div class="flex items-center justify-center min-h-[3rem] w-full flex-none">
                        <p id="popup-status" class="text-sm md:text-base m-0 font-bold ${initialStatusColor} text-center leading-tight transition-colors duration-300 w-full">
                            ${initialStatus}
                        </p>
                    </div>
                    
                    <button id="btn-popup-next" class="px-6 py-3 bg-blue-500 text-white rounded-full font-bold shadow-md hover:bg-blue-600 w-full max-w-[200px] flex items-center justify-center flex-none transition-opacity duration-300 ${state.isPassed ? '' : 'opacity-50 cursor-not-allowed'}" ${state.isPassed ? '' : 'disabled'}>
                        Continuer <i class="ph ph-arrow-right ml-2"></i>
                    </button>
                `;
            }

            popupContent.innerHTML = contentHtml;

            // Attach Listeners
            const btnPlay = document.getElementById('btn-popup-play');
            const btnRecord = document.getElementById('btn-popup-record');
            const btnPopupNext = document.getElementById('btn-popup-next');

            if(btnPopupNext) {
                btnPopupNext.onclick = () => {
                    popupOverlay.classList.add('hidden');
                    btnNext.disabled = false;
                    btnNext.click(); 
                };
            }

            if(btnPlay && taskData.audio) {
                btnPlay.onclick = () => {
                    if (isRecording) return; // 녹음 중일 때 재생 방지

                    if(btnRecord && !state.isPassed) {
                        btnRecord.disabled = true;
                        btnRecord.classList.add('opacity-50', 'pointer-events-none'); // 오디오 재생 중 마이크 클릭 및 호버 완벽 차단
                    }

                    if(popupAudio) { popupAudio.pause(); popupAudio.currentTime = 0; }
                    popupAudio = new Audio(taskData.audio);
                    popupAudio.play();
                    
                    const originalHtml = btnPlay.innerHTML;
                    if(isAudioOnly) {
                        btnPlay.innerHTML = `<div class="audio-wave"><span></span><span></span><span></span><span></span></div>`;
                    } else {
                        btnPlay.innerHTML = `<i class="ph-fill ph-speaker-high text-[clamp(1.25rem,4vmin,1.5rem)]"></i>`;
                    }

                    popupAudio.onended = () => {
                        btnPlay.innerHTML = originalHtml; 
                        if(btnRecord && !state.isPassed) {
                            btnRecord.disabled = false;
                            btnRecord.classList.remove('opacity-50', 'pointer-events-none'); // 오디오 종료 시 마이크 복구
                        }

                        // Audio-Only 카드는 듣기 완료 즉시 통과 처리
                        if (isAudioOnly) {
                            state.isPassed = true;
                            btnNext.disabled = false;
                            const status = document.getElementById('popup-status');
                            if(status) {
                                status.innerHTML = `Très bien ! Passez à la suite.`;
                                status.className = 'text-sm md:text-base m-0 font-bold text-green-500 text-center leading-tight transition-colors duration-300';
                            }
                            if(btnPopupNext) {
                                btnPopupNext.disabled = false;
                                btnPopupNext.classList.remove('opacity-50', 'cursor-not-allowed');
                            }
                        }
                    };
                };

                // 스피킹 과제가 아닐 경우(Audio-only & Repeat) 팝업 열릴 때 자동 재생
                if (!state.isPassed && !isSpeaking) {
                    setTimeout(() => { btnPlay.click(); }, 300);
                }
            }

            if(btnRecord) {
                btnRecord.onclick = () => toggleRecording(taskData, btnRecord);
            }
        }

        btnClosePopup.onclick = () => {
            popupOverlay.classList.add('hidden');
        };

        btnPopupToggle.onclick = () => {
            const data = lessonData[currentIndex];
            if(data.popup) {
                showPopupSequence(data);
            }
        };

        // --- Speech Recognition ---
        async function toggleRecording(taskData, btnEl) {
            // 버튼이 비활성화 상태면 함수 실행 중단 (이중 차단)
            if (btnEl.disabled || btnEl.classList.contains('pointer-events-none')) return;

            if (isRecording) {
                stopRecording();
                btnEl.classList.remove('recording-pulse');
                btnEl.innerHTML = `<i class="ph-fill ph-spinner-gap animate-spin text-[clamp(1.5rem,5vmin,1.875rem)]"></i>`;
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' }); 
                    stream.getTracks().forEach(track => track.stop());
                    await processAudioBlob(audioBlob, taskData, btnEl);
                };

                mediaRecorder.start();
                isRecording = true;
                btnEl.classList.add('recording-pulse');
                btnEl.innerHTML = `<i class="ph-fill ph-stop text-3xl"></i>`;
                
                const status = document.getElementById('popup-status');
                if(status) { 
                    status.innerHTML = `<div class="audio-wave h-full mt-1"><span></span><span></span><span></span><span></span></div>`; 
                    status.className = 'text-sm md:text-base m-0 font-bold text-red-500 text-center leading-tight transition-colors duration-300 w-full';
                }

            } catch (err) {
                console.error("Mic access error:", err);
                alert("L'accès au microphone est requis pour cet exercice.");
            }
        }

        function stopRecording() {
            if(mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                isRecording = false;
            }
        }

        async function processAudioBlob(blob, taskData, btnEl) {
            const status = document.getElementById('popup-status');
            
            try {
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = async () => {
                    const base64data = reader.result.split(',')[1];
                    try {
                        const res = await fetch(CLOVA_API_FUNCTION_URL, {
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ audioBase64: base64data, languageCode: "Kor", referenceText: taskData.reference })
                        });
                        
                        if (!res.ok) {
                            console.warn("API Error:", res.status, "- Using fallback");
                            handleEvaluation(100, taskData, btnEl, status);
                            return;
                        }

                        const result = await res.json();
                        const score = result.assessment?.pronunciation_score || 0;
                        handleEvaluation(score, taskData, btnEl, status);

                    } catch (apiError) {
                        console.warn("API Error", apiError.message, "- Fallback");
                        handleEvaluation(100, taskData, btnEl, status); 
                    }
                };
            } catch (err) {
                console.warn("Processing error", err);
                handleEvaluation(0, taskData, btnEl, status);
            }
        }

        function handleEvaluation(score, taskData, btnEl, status) {
            const state = pageStates[currentIndex];
            state.attemptsCount++;
            let attempts = state.attemptsCount;
            let passThreshold = taskData.threshold || 90; 
            let isRepeat = taskData.type === 'repeat';
            let isSpeaking = taskData.type === 'speaking';
            
            btnEl.innerHTML = `<i class="ph-fill ph-microphone text-3xl"></i>`;
            
            let scoreStr = `<br><span class="text-xs md:text-sm font-normal text-gray-400 mt-1 block leading-tight">(Score: ${Math.round(score)})</span>`;
            let baseClasses = 'text-sm md:text-base m-0 font-bold text-center leading-tight transition-colors duration-300 w-full ';

            if (isRepeat && attempts === 1) {
                if (score >= passThreshold) {
                    status.innerHTML = `Très bien, essayons encore une fois.` + scoreStr;
                    status.className = baseClasses + 'text-green-500';
                } else {
                    if(errorSynth) errorSynth.triggerAttackRelease("D3", "0.2s");
                    status.innerHTML = `On y est presque ! Essayons encore une fois.` + scoreStr;
                    status.className = baseClasses + 'text-yellow-600';
                }
                
                const btnPlay = document.getElementById('btn-popup-play');
                if (btnPlay) setTimeout(() => { btnPlay.click(); }, 800);
                
            } else if (attempts >= 2 || (isSpeaking && score >= passThreshold)) {
                state.isPassed = true;
                
                if (score >= passThreshold) {
                    status.innerHTML = `Très bien ! Passez à la suite.` + scoreStr;
                    status.className = baseClasses + 'text-green-500';
                    if(successSynth) successSynth.triggerAttackRelease(["E5", "G5", "C6"], "8n");
                } else {
                    status.innerHTML = `Bien essayé ! Passez à la suite.` + scoreStr;
                    status.className = baseClasses + 'text-gray-500';
                    if(errorSynth) errorSynth.triggerAttackRelease("D3", "0.2s");
                }
                
                if (isSpeaking) {
                    document.getElementById('task-target').innerText = taskData.krTextFull; 
                }
                
                // 오디오 버튼 활성화 (2회 시도 종료 또는 통과 시)
                const btnPlay = document.getElementById('btn-popup-play');
                if (btnPlay && taskData.audio) {
                    btnPlay.disabled = false;
                    btnPlay.className = "w-14 h-14 rounded-full flex items-center justify-center transition-colors bg-yellow-400 text-yellow-900 hover:bg-yellow-500 shadow-md";
                }

                btnEl.disabled = true;
                btnEl.classList.replace('bg-green-500', 'bg-gray-300');
                btnEl.classList.remove('hover:bg-green-600', 'hover:scale-105');
                btnEl.classList.add('pointer-events-none'); // 퀴즈 종료 시 마이크 완벽 차단
                
                const btnPopupNext = document.getElementById('btn-popup-next');
                if(btnPopupNext) {
                    btnPopupNext.disabled = false;
                    btnPopupNext.classList.remove('opacity-50', 'cursor-not-allowed');
                }
                
                btnNext.disabled = false;
                
            } else {
                if(errorSynth) errorSynth.triggerAttackRelease("D3", "0.2s");
                status.innerHTML = `On y est presque ! Essayons encore une fois.` + scoreStr;
                status.className = baseClasses + 'text-yellow-600';
                
                // 1회 탈락 시 오디오 버튼 활성화 (레이아웃 변동 없음)
                const btnPlay = document.getElementById('btn-popup-play');
                if (btnPlay && taskData.audio) {
                    btnPlay.disabled = false;
                    btnPlay.className = "w-14 h-14 rounded-full flex items-center justify-center transition-colors bg-yellow-400 text-yellow-900 hover:bg-yellow-500 shadow-md";
                }
            }
        }

        // --- Navigation ---
        btnNext.addEventListener('click', async () => {
            if(currentIndex === 0) await initSynths(); 
            if(transitionSynth) transitionSynth.triggerAttackRelease('E5', '0.05s');
            currentIndex++;
            loadPage(currentIndex);
        });

        btnPrev.addEventListener('click', () => {
            if (currentIndex > 0) {
                if(transitionSynth) transitionSynth.triggerAttackRelease('C5', '0.05s');
                currentIndex--;
                loadPage(currentIndex);
            }
        });

        // Initialize
        loadPage(currentIndex);

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission débutant - Aller au convenience store - Leçon 3-2</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Tone.js pour les sons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            background-color: #FEFCE8; 
            touch-action: none;
            font-family: 'Inter', 'Noto Sans', sans-serif;
            color: #1F2937;
        }

        #app-container {
            width: 100vw; height: 100dvh; 
            padding: clamp(10px, 3vh, 2rem);
            box-sizing: border-box;
            display: flex; justify-content: center; align-items: center;
        }

        .lesson-card {
            width: 100%; max-width: 800px; height: 100%;
            background: white; border-radius: 1.5rem; border: 2px solid #FEF08A;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        #content-area {
            flex: 1 1 auto; display: flex; flex-direction: column;
            justify-content: center; align-items: center;    
            padding: clamp(1.5rem, 4vw, 3rem); gap: clamp(1.5rem, 4vh, 2.5rem);
            overflow: hidden; min-height: 0; position: relative;
        }

        .text-title { font-size: clamp(1.5rem, 5vw, 2.5rem); line-height: 1.2; font-weight: 800; }
        .text-body { font-size: clamp(1rem, 3vw, 1.25rem); line-height: 1.5; color: #374151; }
        .text-icon { font-size: clamp(3.5rem, 10vw, 5rem); }

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .animate-pop-in { animation: popIn 0.3s ease-out forwards; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }

        .recording-pulse { animation: pulse-red 1.5s infinite; background-color: #EF4444 !important; color: white !important; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .audio-wave { display: flex; align-items: center; justify-content: center; gap: 4px; height: 100%; }
        .audio-wave span { display: block; width: 4px; background-color: #22C55E; border-radius: 2px; animation: wave 1s infinite ease-in-out; }
        .audio-wave span:nth-child(2) { animation-delay: 0.2s; }
        .audio-wave span:nth-child(3) { animation-delay: 0.4s; }
        .audio-wave span:nth-child(4) { animation-delay: 0.6s; }
        @keyframes wave { 0%, 100% { height: 30%; } 50% { height: 100%; } }

        #popup-overlay { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(2px); }
        
        .control-btn {
            padding: clamp(0.5rem, 2vw, 0.75rem) clamp(1rem, 3vw, 1.5rem);
            border-radius: 0.75rem; font-weight: 700; font-size: clamp(0.875rem, 2vw, 1rem);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; white-space: nowrap;
        }

        .popup-flex-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            width: 100%;
            padding: 0;
            margin: 0;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="lesson-view" class="lesson-card">
            <div id="content-area"></div>

            <div id="controls-area" class="w-full flex-none border-t border-gray-100 bg-white px-6 py-6 flex flex-col justify-center gap-3 z-10 relative">
                <div id="progress-container" class="hidden w-full flex-col gap-1">
                    <div class="flex justify-end w-full leading-none">
                        <span id="progress-text" class="text-[10px] text-gray-400 font-bold tracking-wider m-0 leading-none">1/13</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-1">
                        <div id="progress-bar" class="bg-green-500 h-1 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>

                <div class="flex justify-between items-center w-full">
                    <div class="flex items-center gap-2">
                        <button id="btn-prev" class="invisible control-btn bg-gray-100 text-gray-600 hover:bg-gray-200">
                            <i class="ph ph-arrow-left mr-1"></i> <span class="hidden sm:inline">Précédent</span>
                        </button>
                        <button id="btn-popup-toggle" class="invisible control-btn bg-yellow-100 text-yellow-700 hover:bg-yellow-200">
                            <i class="ph ph-chat-centered-text mr-1"></i> <span class="hidden sm:inline">Exercice</span>
                        </button>
                    </div>
                    <button id="btn-next" class="control-btn bg-green-500 text-white hover:bg-green-600 disabled:opacity-50 shadow-sm">
                        <span id="btn-next-text">Commencer</span> <i id="btn-next-icon" class="ph ph-arrow-right ml-1"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="popup-overlay" class="absolute inset-0 z-50 hidden flex justify-center items-center p-4">
            <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-[420px] h-[75vh] flex flex-col animate-pop-in relative border-4 border-yellow-400" style="padding: clamp(1.5rem, 4vh, 2rem);">
                <div id="popup-content" class="w-full h-full"></div>
            </div>
        </div>
    </div>

    <script>
        const lessonData = [
            { id: 1, type: 'intro', subtitle: "Mission débutant - Aller au convenience store", title: "100% Oral : À vous de parler !", buttonText: "Commencer" },
            { id: 2, type: 'title-card', title: "따라 말하기", subtitle: "Répétez les phrases que vous avez apprises dans la leçon précédente." },
            { id: 3, type: 'repeat-quiz', krText: "찾으시는 거 있으세요?", frText: "Cherchez-vous quelque chose ?", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1775586049/S3-1_zjos8x.mp3", reference: "찾으시는 거 있으세요", threshold: 60, mandatoryTwoAttempts: false },
            { id: 4, type: 'repeat-quiz', krText: "바나나 우유 있어요?", frText: "Avez-vous du lait à la banane ?", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1775585967/S3-2_tilbcv.mp3", reference: "바나나 우유 있어요", threshold: 70, mandatoryTwoAttempts: true },
            { id: 5, type: 'repeat-quiz', krText: "캔커피 옆에 있어요.", frText: "Ils sont à côté du café en canette.", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1775586036/S3-3_u1lynz.mp3", reference: "캔커피 옆에 있어요", threshold: 60, mandatoryTwoAttempts: false },
            { id: 6, type: 'repeat-quiz', krText: "이거 더 있어요?", frText: "Vous en avez d'autres ?", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1775586041/S3-4_hgosnc.mp3", reference: "이거 더 있어요", threshold: 70, mandatoryTwoAttempts: true },
            { id: 7, type: 'repeat-quiz', krText: "아니요, 한 개 밖에 없어요.", frText: "Non, il n’y en a qu’un seul.", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1775586045/S3-5_jkodmq.mp3", reference: "아니요 한 개 밖에 없어요|아니요 한개 밖에 없어요", threshold: 60, mandatoryTwoAttempts: false },
            { id: 8, type: 'title-card', title: "직접 말하기", subtitle: "Parlez-vous même en coréen en utilisant les phrases que vous avez apprises." },
            { 
                id: 9, type: 'interactive-quiz', 
                audioCard: { krText: "어서 오세요, 찾으시는 거 있으세요?", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1776061092/Ex-2_pexqmj.wav" },
                speakingCard: { consigne: "Demandez s’il y a du lait à la banane.", hint: "바나나 우유", answer: "바나나 우유 있어요?", reference: "바나나 우유 있어요", threshold: 70 }
            },
            { 
                id: 10, type: 'interactive-quiz', 
                audioCard: { krText: "(Demandez s'il y en a plus.)", audio: "" },
                speakingCard: { consigne: "Demandez s'il y en a plus.", hint: "plus = 더", answer: "이거 더 있어요?", reference: "이거 더 있어요", threshold: 70 }
            },
            { 
                id: 11, type: 'interactive-quiz', 
                audioCard: { krText: "결제 도와드릴게요. 4000원입니다.", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1776023605/Ex-1_ivvh73.wav" },
                speakingCard: { consigne: "Payez en disant 'Voici'.", hint: "voici.", answer: "여기요.", reference: "여기요", threshold: 70 }
            },
            { 
                id: 12, type: 'interactive-quiz', 
                audioCard: { krText: "감사합니다, 안녕히 가세요.", audio: "https://res.cloudinary.com/de76i94ia/video/upload/v1774888032/S-3_w316i0.wav" },
                speakingCard: { consigne: "Dites au revoir.", hint: "Au revoir.", answer: "안녕히 계세요.", reference: "안녕히 계세요", threshold: 70 }
            },
            { id: 13, type: 'outro', title: "Bon travail !", subtitle: "Vous avez pratiqué toutes les phrases apprises dans les chapitres 1 à 3. Passez au jeu de rôle et tenez une conversation en coréen !" }
        ];

        let currentIndex = 0;
        let currentAudio = null;
        let correctSound, completionSynth, transitionSynth, successSynth, errorSynth;
        let pageStates = lessonData.map(() => ({ isPassed: false, attemptsCount: 0, lastStatusHtml: '', lastStatusClass: '' }));
        let mediaRecorder, audioChunks = [], isRecording = false;
        let popupTimeoutId = null;

        const BASE_44_ORIGIN = "https://coreeno.base44.app"; 
        const CLOVA_API_FUNCTION_URL = BASE_44_ORIGIN + '/api/functions/naverClovaSpeech';

        function calculateSimilarity(str1, str2) {
            const s1 = (str1 || "").replace(/[^가-힣a-zA-Z0-9]/g, '');
            const s2 = (str2 || "").replace(/[^가-힣a-zA-Z0-9]/g, '');
            if (s1.length === 0 && s2.length === 0) return 100;
            if (s1.length === 0 || s2.length === 0) return 0;
            let costs = new Array(s2.length + 1);
            for (let i = 0; i <= s1.length; i++) {
                let lastValue = i;
                for (let j = 0; j <= s2.length; j++) {
                    if (i === 0) costs[j] = j;
                    else if (j > 0) {
                        let newValue = costs[j - 1];
                        if (s1.charAt(i - 1) !== s2.charAt(j - 1))
                            newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                        costs[j - 1] = lastValue;
                        lastValue = newValue;
                    }
                }
                if (i > 0) costs[s2.length] = lastValue;
            }
            return Math.max(0, (1 - costs[s2.length] / Math.max(s1.length, s2.length)) * 100);
        }

        async function initSynths() {
            if(!correctSound) {
                await Tone.start();
                correctSound = new Tone.Synth().toDestination();
                completionSynth = new Tone.PolySynth(Tone.Synth).toDestination();
                successSynth = new Tone.PolySynth(Tone.Synth).toDestination();
                transitionSynth = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 } }).toDestination();
                errorSynth = new Tone.Synth({ oscillator: { type: 'triangle' }, envelope: { attack: 0.05, decay: 0.2, sustain: 0.2, release: 0.4 } }).toDestination();
            }
        }

        function stopAllMedia() {
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); isRecording = false; }
            if (popupTimeoutId) { clearTimeout(popupTimeoutId); popupTimeoutId = null; }
        }

        function updateProgress() {
            const container = document.getElementById('progress-container');
            const bar = document.getElementById('progress-bar');
            const text = document.getElementById('progress-text');
            if (currentIndex === 0) container.classList.add('hidden');
            else {
                container.classList.remove('hidden'); container.classList.add('flex');
                const total = lessonData.length - 1; 
                bar.style.width = `${(currentIndex / total) * 100}%`;
                text.innerText = `${currentIndex}/${total}`;
            }
        }

        function loadPage(index) {
            stopAllMedia();
            document.getElementById('popup-overlay').classList.add('hidden');
            document.getElementById('btn-popup-toggle').classList.add('invisible');
            
            const nextBtn = document.getElementById('btn-next');
            nextBtn.classList.remove('invisible');
            
            if(index === 0) document.getElementById('btn-prev').classList.add('invisible'); 
            else document.getElementById('btn-prev').classList.remove('invisible');

            const data = lessonData[index];
            const state = pageStates[index];
            updateProgress();

            const area = document.getElementById('content-area');
            document.getElementById('btn-next-text').innerText = "Suivant";
            document.getElementById('controls-area').classList.remove('hidden');
            
            if (data.type === 'repeat-quiz' || data.type === 'interactive-quiz') {
                nextBtn.disabled = !state.isPassed;
            } else {
                nextBtn.disabled = false;
            }

            if (data.type === 'intro') {
                area.innerHTML = `
                    <div class="text-yellow-500 animate-fade-in"><i class="ph-fill ph-storefront text-icon"></i></div>
                    <div class="flex flex-col items-center justify-center gap-2 w-full text-center">
                        <h3 class="text-[clamp(0.75rem,2vw,1rem)] text-gray-500 font-bold uppercase m-0 tracking-wide">${data.subtitle}</h3>
                        <h1 class="text-title text-green-600 animate-fade-in delay-100 m-0 leading-tight">${data.title}</h1>
                    </div>
                `;
                document.getElementById('btn-next-text').innerText = data.buttonText;
            } else if (data.type === 'title-card') {
                area.innerHTML = `
                    <div class="flex flex-col items-center justify-center gap-4 text-center animate-pop-in">
                        <h1 class="text-[clamp(2rem,6vw,3rem)] font-extrabold text-blue-600 m-0">${data.title}</h1>
                        <p class="text-body text-gray-600 m-0 max-w-md">${data.subtitle}</p>
                    </div>
                `;
                state.isPassed = true;
                nextBtn.disabled = false;
            } else if (data.type === 'repeat-quiz') {
                area.innerHTML = `
                    <div class="flex flex-col items-center w-full text-center animate-fade-in bg-white rounded-3xl border-4 border-yellow-300 shadow-sm max-w-lg" style="padding: clamp(1.5rem, 4vh, 2.5rem); gap: clamp(1rem, 3vh, 2rem);">
                        <h2 class="text-[clamp(1.25rem,4vw,2rem)] font-extrabold text-gray-800 m-0 leading-tight">${data.krText}</h2>
                        <p class="text-[clamp(0.875rem,2.5vw,1.125rem)] text-gray-500 m-0 leading-tight">${data.frText}</p>
                        <div class="flex items-center justify-center w-full" style="gap: clamp(1rem, 3vw, 1.5rem);">
                            <button id="btn-main-play" class="w-[clamp(3.5rem,10vw,4.5rem)] h-[clamp(3.5rem,10vw,4.5rem)] shrink-0 rounded-full flex items-center justify-center bg-yellow-400 text-yellow-900 shadow-md hover:bg-yellow-500 transition-colors"><i class="ph-fill ph-play text-[clamp(1.5rem,5vw,2rem)]"></i></button>
                            <button id="btn-main-record" class="w-[clamp(4rem,12vw,5rem)] h-[clamp(4rem,12vw,5rem)] shrink-0 ${state.isPassed ? 'bg-gray-300 pointer-events-none' : 'bg-green-500 hover:bg-green-600'} text-white rounded-full flex items-center justify-center shadow-lg transition-all" ${state.isPassed ? 'disabled' : ''}><i class="ph-fill ph-microphone text-[clamp(1.5rem,5vw,2rem)]"></i></button>
                        </div>
                        <div class="flex flex-col items-center justify-center w-full" style="min-height: clamp(3.5rem, 8vh, 5rem);">
                            <p id="main-status" class="${state.attemptsCount > 0 ? state.lastStatusClass : `text-[clamp(0.875rem,2.5vw,1.125rem)] font-bold ${state.isPassed ? 'text-green-500' : 'text-gray-500'} text-center w-full m-0`}">${state.attemptsCount > 0 ? state.lastStatusHtml : (state.isPassed ? 'Très bien ! Passez à la suite.' : 'Appuyez sur le micro pour parler')}</p>
                        </div>
                    </div>
                `;
                const bPlay = document.getElementById('btn-main-play');
                const bRecord = document.getElementById('btn-main-record');
                bPlay.onclick = () => {
                    if (isRecording) return;
                    if (bRecord && !state.isPassed) { bRecord.disabled = true; bRecord.classList.add('opacity-50', 'pointer-events-none'); }
                    if(currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
                    currentAudio = new Audio(data.audio); currentAudio.play();
                    const orig = bPlay.innerHTML; bPlay.innerHTML = `<i class="ph-fill ph-speaker-high text-[clamp(1.5rem,5vw,2rem)]"></i>`;
                    currentAudio.onended = () => { 
                        bPlay.innerHTML = orig; 
                        if (bRecord && !state.isPassed) { bRecord.disabled = false; bRecord.classList.remove('opacity-50', 'pointer-events-none'); }
                    };
                };
                bRecord.onclick = () => toggleRecording(data, bRecord, 'main-status', false);
                if (!state.isPassed && state.attemptsCount === 0) setTimeout(() => bPlay.click(), 500);
            } else if (data.type === 'interactive-quiz') {
                if (state.isPassed) document.getElementById('btn-popup-toggle').classList.remove('invisible');
                area.innerHTML = `
                    <div class="flex flex-col items-center w-full text-center animate-fade-in max-w-lg" style="gap: clamp(1rem, 3vh, 2rem);">
                        <div class="bg-blue-50 border-2 border-blue-200 rounded-2xl w-full relative shadow-sm flex flex-col items-center" style="padding: clamp(1.5rem, 4vh, 2.5rem); gap: clamp(0.5rem, 2vh, 1rem);">
                            <div class="flex justify-center items-center w-full">
                                <button id="btn-cue-play" class="w-[clamp(3.5rem,10vw,4.5rem)] h-[clamp(3.5rem,10vw,4.5rem)] shrink-0 rounded-full bg-blue-500 text-white flex items-center justify-center shadow hover:bg-blue-600 transition ${!data.audioCard.audio ? 'hidden' : ''}"><i class="ph-fill ph-speaker-high text-[clamp(1.5rem,5vw,2rem)]"></i></button>
                                ${!data.audioCard.audio ? '<div class="text-blue-500 font-bold">Lisez la consigne attentivement.</div>' : ''}
                            </div>
                            <div id="cue-hint-container" class="cursor-pointer text-blue-500 hover:text-blue-700 transition-colors inline-flex items-center font-bold" style="gap: clamp(0.25rem, 1vw, 0.5rem);">
                                <span id="cue-hint-text" class="hidden text-[clamp(0.875rem,2.5vw,1.125rem)] font-bold text-center">${data.audioCard.krText}</span>
                                <span id="cue-hint-icon" class="text-[clamp(0.875rem,2.5vw,1.125rem)] font-bold"><i class="ph-bold ph-lightbulb"></i> Indice</span>
                            </div>
                        </div>
                        <p class="text-[clamp(0.75rem,2vw,0.875rem)] text-gray-400 animate-pulse m-0 ${state.isPassed ? 'hidden' : ''}">Le quiz commencera sous peu...</p>
                    </div>
                `;
                document.getElementById('cue-hint-container').onclick = () => {
                    document.getElementById('cue-hint-icon').classList.add('hidden');
                    document.getElementById('cue-hint-text').classList.remove('hidden');
                };
                const bCuePlay = document.getElementById('btn-cue-play');
                bCuePlay.onclick = () => {
                    if (isRecording) return;
                    if(currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
                    currentAudio = new Audio(data.audioCard.audio); currentAudio.play();
                    const orig = bCuePlay.innerHTML; bCuePlay.innerHTML = `<i class="ph-fill ph-speaker-high text-[clamp(1.5rem,5vw,2rem)]"></i>`;
                    currentAudio.onended = () => { 
                        bCuePlay.innerHTML = orig; 
                        triggerPopup(data, state);
                    };
                };

                function triggerPopup(data, state) {
                    const overlay = document.getElementById('popup-overlay');
                    if (overlay.classList.contains('hidden') && !state.isPassed) {
                        popupTimeoutId = setTimeout(() => showInteractivePopup(data), 1000);
                    }
                }

                if (!state.isPassed && state.attemptsCount === 0) {
                    if (data.audioCard.audio) setTimeout(() => bCuePlay.click(), 500);
                    else setTimeout(() => triggerPopup(data, state), 1500);
                }
            } else if (data.type === 'outro') {
                area.innerHTML = `
                    <div class="text-yellow-500 animate-pop-in"><i class="ph-fill ph-confetti text-icon"></i></div>
                    <div class="text-body max-w-2xl text-center animate-fade-in flex flex-col gap-2">
                        <h1 class="text-[clamp(2rem,6vw,3rem)] font-extrabold text-blue-600 m-0">${data.title}</h1>
                        <p class="text-[clamp(0.875rem,2.5vw,1.125rem)]">${data.subtitle}</p>
                    </div>
                `;
                nextBtn.classList.add('invisible'); 
                if (completionSynth) completionSynth.triggerAttackRelease(["C5", "E5", "G5", "C6"], "4n");
                window.parent.postMessage({ type: 'lesson_complete' }, '*');
            }
        }

        function showInteractivePopup(data) {
            const overlay = document.getElementById('popup-overlay');
            const content = document.getElementById('popup-content');
            const state = pageStates[currentIndex];
            const isCompleted = state.isPassed || state.attemptsCount >= 3;
            const hasFailedOnce = state.attemptsCount >= 1;

            const defaultStatusText = state.isPassed ? 'Très bien ! Passez à la suite.' : 'Appuyez sur le micro pour parler';
            const statusHtml = state.attemptsCount > 0 ? state.lastStatusHtml : defaultStatusText;
            const statusClass = state.attemptsCount > 0 ? state.lastStatusClass : `text-[clamp(0.8rem,2.2vw,1rem)] font-bold ${state.isPassed ? 'text-green-500' : 'text-gray-500'} text-center w-full m-0 leading-tight`;

            content.innerHTML = `
                <button id="btn-close-popup" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 p-1 leading-none z-10">
                    <i class="ph ph-x text-[clamp(1.25rem,4vw,2rem)]"></i>
                </button>
                <div class="popup-flex-container">
                    <div class="w-full flex justify-center items-center text-center">
                        <p class="text-[clamp(0.9rem,3vw,1.25rem)] font-bold text-gray-700 m-0 leading-tight px-4">${data.speakingCard.consigne || 'Écoutez et parlez'}</p>
                    </div>

                    <div class="flex flex-col items-center justify-center w-full gap-4">
                        <button id="btn-popup-record" class="w-[clamp(4.5rem,15vw,6rem)] h-[clamp(4.5rem,15vw,6rem)] shrink-0 ${isCompleted ? 'bg-gray-300 pointer-events-none' : 'bg-green-500 hover:bg-green-600'} text-white rounded-full flex items-center justify-center shadow-lg transition-all" ${isCompleted ? 'disabled' : ''}>
                            <i class="ph-fill ph-microphone text-[clamp(1.75rem,6vw,2.5rem)]"></i>
                        </button>
                        <div class="flex items-center justify-center w-full" style="min-height: clamp(3rem, 10vh, 5rem);">
                            <p id="popup-status" class="${statusClass}">
                                ${statusHtml}
                            </p>
                        </div>
                    </div>
                    
                    <div class="flex flex-col items-center justify-center w-full gap-2">
                        <div id="speaking-hint" class="text-[clamp(0.9rem,2.8vw,1.15rem)] font-bold text-blue-500 m-0 transition-opacity duration-300 leading-tight ${hasFailedOnce ? 'opacity-100' : 'opacity-0'}">Hint: ${data.speakingCard.hint}</div>
                        <div id="speaking-answer" class="text-[clamp(1.1rem,3.8vw,1.5rem)] font-bold text-blue-600 m-0 leading-tight transition-all duration-300 text-center px-2 ${isCompleted ? 'opacity-100' : 'opacity-0'}">Answer: ${data.speakingCard.answer}</div>
                    </div>
                    
                    <button id="btn-popup-next" class="px-[clamp(1.5rem,5vw,2.5rem)] py-[clamp(0.6rem,2vh,0.9rem)] shrink-0 bg-blue-500 text-white rounded-full font-bold shadow-md hover:bg-blue-600 w-full max-w-[240px] flex items-center justify-center transition-opacity duration-300 text-[clamp(0.875rem,2.5vw,1.1rem)] leading-none ${isCompleted ? '' : 'opacity-50 cursor-not-allowed'}" ${isCompleted ? '' : 'disabled'}>
                        Continuer <i class="ph ph-arrow-right ml-2"></i>
                    </button>
                </div>
            `;
            overlay.classList.remove('hidden');
            const bRecord = document.getElementById('btn-popup-record');
            const bNext = document.getElementById('btn-popup-next');
            const bClose = document.getElementById('btn-close-popup');

            bRecord.onclick = () => toggleRecording(data, bRecord, 'popup-status', true);
            bNext.onclick = () => { overlay.classList.add('hidden'); document.getElementById('btn-next').click(); };
            bClose.onclick = () => { overlay.classList.add('hidden'); if(state.isPassed) document.getElementById('btn-next').disabled = false; };
        }

        async function toggleRecording(taskData, btnEl, statusId, isInteractive) {
            if (btnEl.disabled || btnEl.classList.contains('pointer-events-none')) return;
            if (isRecording) { stopRecording(); btnEl.innerHTML = `<i class="ph-fill ph-spinner-gap animate-spin text-[clamp(1.5rem,5vw,2rem)]"></i>`; return; }
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' }); 
                    stream.getTracks().forEach(track => track.stop());
                    processAudio(blob, taskData, btnEl, statusId, isInteractive);
                };
                mediaRecorder.start(); isRecording = true;
                btnEl.classList.add('recording-pulse'); btnEl.innerHTML = `<i class="ph-fill ph-stop text-[clamp(1.5rem,5vw,2rem)]"></i>`;
                const st = document.getElementById(statusId);
                if(st) { st.innerHTML = `<div class="audio-wave h-full"><span></span><span></span><span></span><span></span></div>`; st.className = 'text-red-500 w-full text-center m-0'; }
            } catch (err) { console.error(err); }
        }

        function stopRecording() { if(mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); isRecording = false; } }

        async function processAudio(blob, taskData, btnEl, statusId, isInteractive) {
            const reader = new FileReader(); reader.readAsDataURL(blob);
            reader.onloadend = async () => {
                const base64 = reader.result.split(',')[1];
                const refs = isInteractive ? taskData.speakingCard.reference.split('|') : taskData.reference.split('|');
                let bestScore = 0;
                for(const r of refs) {
                    try {
                        const res = await fetch(CLOVA_API_FUNCTION_URL, { 
                            method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify({ audioBase64: base64, languageCode: "Kor", referenceText: r, assessment: false }) 
                        });
                        if (res.ok) { 
                            const json = await res.json(); 
                            const recognizedText = json.text || json.recognized || "";
                            const sim = calculateSimilarity(recognizedText, r);
                            if(sim > bestScore) bestScore = sim;
                        }
                    } catch (e) { console.error(e); }
                }
                evaluate(bestScore, taskData, btnEl, document.getElementById(statusId), isInteractive);
            };
        }

        function evaluate(score, taskData, btnEl, status, isInteractive) {
            const state = pageStates[currentIndex];
            state.attemptsCount++;
            const att = state.attemptsCount;
            btnEl.innerHTML = `<i class="ph-fill ph-microphone text-[clamp(1.5rem,5vw,2rem)]"></i>`;
            btnEl.classList.remove('recording-pulse');
            const scoreStr = `<span class="text-[clamp(0.75rem,2vw,0.875rem)] text-gray-400 font-normal mt-1 block">(Score: ${Math.round(score)})</span>`;
            const baseClasses = 'text-[clamp(0.875rem,2.5vw,1.1rem)] font-bold text-center w-full transition-colors m-0 leading-tight ';

            if (!isInteractive) {
                const threshold = taskData.threshold || 60;
                const isMandatory2 = lessonData[currentIndex].mandatoryTwoAttempts;

                if (isMandatory2) {
                    if (att < 2) {
                        if (score >= threshold) {
                            status.innerHTML = "Très bien, essayons encore une fois.<br>" + scoreStr;
                            status.className = baseClasses + 'text-green-500';
                        } else {
                            if(errorSynth) errorSynth.triggerAttackRelease("D3", "0.2s");
                            status.innerHTML = "On y est presque ! Essayons encore une fois.<br>" + scoreStr;
                            status.className = baseClasses + 'text-yellow-600';
                        }
                        const bPlay = document.getElementById('btn-main-play');
                        if (bPlay) setTimeout(() => bPlay.click(), 800);
                    } else {
                        state.isPassed = true;
                        if (score >= threshold) {
                            status.innerHTML = "Très bien ! Passez à la suite.<br>" + scoreStr;
                            status.className = baseClasses + 'text-green-500';
                            if(successSynth) successSynth.triggerAttackRelease(["E5", "G5", "C6"], "8n");
                        } else {
                            status.innerHTML = "Bien essayé ! Passez à la suite.<br>" + scoreStr;
                            status.className = baseClasses + 'text-gray-500';
                            if(errorSynth) errorSynth.triggerAttackRelease("D3", "0.2s");
                        }
                        finishTask(btnEl, false);
                    }
                } else {
                    if (score >= threshold) {
                        state.isPassed = true;
                        status.innerHTML = `Très bien ! Passez à la suite.<br>` + scoreStr;
                        status.className = baseClasses + 'text-green-500';
                        if(successSynth) successSynth.triggerAttackRelease(["E5", "G5", "C6"], "8n");
                        finishTask(btnEl, false);
                    } else if (att < 2) {
                        if(errorSynth) errorSynth.triggerAttackRelease("D3", "0.2s");
                        status.innerHTML = "On y est presque ! Essayons encore une fois.<br>" + scoreStr;
                        status.className = baseClasses + 'text-yellow-600';
                        const bPlay = document.getElementById('btn-main-play');
                        if (bPlay) setTimeout(() => bPlay.click(), 800);
                    } else {
                        state.isPassed = true;
                        status.innerHTML = `Bien essayé ! Passez à la suite.<br>` + scoreStr;
                        status.className = baseClasses + 'text-gray-500';
                        if(errorSynth) errorSynth.triggerAttackRelease("D3", "0.2s");
                        finishTask(btnEl, false);
                    }
                }
            } else {
                const threshold = taskData.speakingCard.threshold || 70;
                if (score >= threshold) {
                    state.isPassed = true;
                    status.innerHTML = `Très bien ! Passez à la suite.<br>` + scoreStr;
                    status.className = baseClasses + 'text-green-500';
                    const ans = document.getElementById('speaking-answer'); if(ans) ans.classList.replace('opacity-0', 'opacity-100');
                    if(successSynth) successSynth.triggerAttackRelease(["E5", "G5", "C6"], "8n");
                    finishTask(btnEl, true);
                } else if (att < 3) {
                    if(errorSynth) errorSynth.triggerAttackRelease("D3", "0.2s");
                    status.innerHTML = "On y est presque ! Essayons encore une fois.<br>" + scoreStr;
                    status.className = baseClasses + 'text-yellow-600';
                    const hint = document.getElementById('speaking-hint'); if(hint) hint.classList.replace('opacity-0', 'opacity-100');
                    if (taskData.audioCard && taskData.audioCard.audio) {
                        setTimeout(() => new Audio(taskData.audioCard.audio).play(), 500);
                    }
                } else {
                    state.isPassed = true;
                    status.innerHTML = `Bien essayé ! Passez à la suite.<br>` + scoreStr;
                    status.className = baseClasses + 'text-gray-500';
                    const ans = document.getElementById('speaking-answer'); if(ans) ans.classList.replace('opacity-0', 'opacity-100');
                    if(errorSynth) errorSynth.triggerAttackRelease("D3", "0.2s");
                    finishTask(btnEl, true);
                }
            }
            state.lastStatusHtml = status.innerHTML;
            state.lastStatusClass = status.className;
        }

        function finishTask(btnEl, isInteractive) {
            btnEl.disabled = true; 
            btnEl.classList.remove('bg-green-500', 'hover:bg-green-600');
            btnEl.classList.add('bg-gray-300', 'pointer-events-none'); 
            
            document.getElementById('btn-next').disabled = false;
            if (isInteractive) {
                document.getElementById('btn-popup-toggle').classList.remove('invisible');
                const bNextPop = document.getElementById('btn-popup-next');
                if(bNextPop) { 
                    bNextPop.disabled = false; 
                    bNextPop.classList.remove('opacity-50', 'cursor-not-allowed'); 
                }
            }
        }

        window.addEventListener('beforeunload', stopAllMedia);
        document.getElementById('btn-next').addEventListener('click', async () => { 
            if(currentIndex === 0) await initSynths(); 
            if(transitionSynth) transitionSynth.triggerAttackRelease('E5', '0.05s'); 
            currentIndex++; 
            loadPage(currentIndex); 
        });
        document.getElementById('btn-prev').addEventListener('click', () => { 
            if (currentIndex > 0) { 
                if(transitionSynth) transitionSynth.triggerAttackRelease('C5', '0.05s'); 
                currentIndex--; 
                loadPage(currentIndex); 
            } 
        });
        document.getElementById('btn-popup-toggle').onclick = () => { const d = lessonData[currentIndex]; if(d.type === 'interactive-quiz') showInteractivePopup(d); };
        loadPage(0);
    </script>
</body>
</html>
